<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory — Truck Parts To Go</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#D62B2B;
    --red-dark:#A81F1F;
    --bg:#FFFFFF;
    --surface:#F7F6F4;
    --surface2:#EFEDE9;
    --border:#DDDAD3;
    --text:#161513;
    --text-dim:#666461;
    --text-faint:#8C8983;
    --success:#1F8055;
    --warning:#A8650F;
    --danger:#D62B2B;
    --font-display:'Bebas Neue', sans-serif;
    --font-ui:'Oswald', sans-serif;
    --font-body:'Inter', sans-serif;
    --ease:cubic-bezier(0.23,1,0.32,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.5;min-height:100vh}
  ::selection{background:var(--red);color:#fff}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
  .brand{display:flex;align-items:center;gap:12px}
  .brand-mark{width:36px;height:36px;background:var(--red);display:flex;align-items:center;justify-content:center;clip-path:polygon(15% 0,100% 0,85% 100%,0 100%)}
  .brand-mark svg{width:18px;height:18px;stroke:#fff;fill:none}
  .brand-text h1{font-family:var(--font-display);font-size:22px;letter-spacing:.03em;line-height:1}
  .brand-text p{font-family:var(--font-ui);font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
  .sync-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-faint);font-family:var(--font-ui);text-transform:uppercase;letter-spacing:.05em}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--success)}
  .actions{display:flex;gap:10px;flex-wrap:wrap}
  .btn{font-family:var(--font-ui);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;padding:10px 18px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .2s var(--ease)}
  .btn:hover{background:var(--surface2);border-color:#bbb}
  .btn.primary{background:var(--red);border-color:var(--red);color:#fff}
  .btn.primary:hover{background:var(--red-dark)}
  .btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
  .main{max-width:1280px;margin:0 auto;padding:28px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--red);padding:18px 20px}
  .stat-card .label{font-family:var(--font-ui);font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  .stat-card .value{font-family:var(--font-display);font-size:34px;line-height:1;letter-spacing:.02em}
  .filters{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
  .search-wrap{position:relative;flex:1 1 280px;min-width:220px}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text-faint);fill:none;stroke-width:2}
  input[type=text],input[type=number],select,textarea{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:13px;padding:10px 12px;width:100%;transition:border-color .15s}
  .search-wrap input{padding-left:36px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--red)}
  select{cursor:pointer;min-width:160px;width:auto}
  .results-count{font-family:var(--font-ui);font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
  .table-wrap{overflow-x:auto;border:1px solid var(--border)}
  table{width:100%;border-collapse:collapse;min-width:760px}
  thead tr{background:var(--surface)}
  th{text-align:left;padding:12px 14px;font-family:var(--font-ui);font-size:10.5px;font-weight:500;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);white-space:nowrap}
  td{padding:13px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
  tbody tr:hover{background:var(--surface)}
  .pn-code{font-family:'Courier New',monospace;font-size:12px;color:var(--text);letter-spacing:.01em}
  .row-actions{display:flex;gap:6px;justify-content:flex-end}
  .icon-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s}
  .icon-btn:hover{border-color:#555;color:var(--text);background:var(--surface2)}
  .icon-btn.danger:hover{border-color:var(--danger);color:var(--danger);background:rgba(214,43,43,.1)}
  .icon-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
  .badge{font-family:var(--font-ui);font-size:10.5px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;padding:4px 10px;display:inline-block;border:1px solid}
  .badge.success{color:var(--success);border-color:var(--success);background:rgba(31,128,85,.08)}
  .badge.warning{color:var(--warning);border-color:var(--warning);background:rgba(168,101,15,.08)}
  .badge.danger{color:var(--danger);border-color:var(--danger);background:rgba(214,43,43,.08)}
  .badge.secondary{color:var(--text-dim);border-color:var(--border);background:var(--surface2)}
  .empty-state{text-align:center;padding:64px 20px;color:var(--text-faint)}
  .empty-state svg{width:40px;height:40px;stroke:var(--text-faint);fill:none;stroke-width:1.5;margin-bottom:14px}
  .empty-state p{font-family:var(--font-ui);font-size:13px;text-transform:uppercase;letter-spacing:.04em}
  .form-card{background:var(--surface);border:1px solid var(--border);padding:28px;max-width:920px}
  .form-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;border-bottom:1px solid var(--border);padding-bottom:18px}
  .form-header h2{font-family:var(--font-display);font-size:24px;letter-spacing:.02em}
  .pn-preview{background:var(--surface2);border-left:3px solid var(--red);padding:16px 18px;margin-bottom:24px}
  .pn-preview .pn-label{font-family:var(--font-ui);font-size:10.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  .pn-preview .pn-value{font-family:'Courier New',monospace;font-size:18px;font-weight:600;letter-spacing:.02em;color:var(--text);word-break:break-all}
  .section-label{font-family:var(--font-ui);font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:block}
  .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:24px}
  .cat-pill{border:1px solid var(--border);background:var(--surface2);padding:10px 12px;cursor:pointer;transition:all .15s}
  .cat-pill:hover{border-color:#999}
  .cat-pill.active{border-color:var(--red);background:rgba(214,43,43,.1)}
  .cat-pill .code{font-family:'Courier New',monospace;font-size:13px;font-weight:600;color:var(--text)}
  .cat-pill.active .code{color:var(--red)}
  .cat-pill .name{font-size:11px;color:var(--text-dim);margin-top:2px}
  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
  .field-grid.three{grid-template-columns:1fr 1fr 1fr}
  .field label{display:block;font-family:var(--font-ui);font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
  .field .hint{font-size:11px;color:var(--text-faint);margin-top:4px}
  .field .opt-tag{font-size:10px;color:var(--text-faint);text-transform:none;letter-spacing:0;margin-left:4px}
  .yearrange-wrap{display:flex;align-items:center;gap:8px}
  .yearrange-wrap span{color:var(--text-faint);font-size:12px}
  .form-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
  .dynamic-fields-section{border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:20px 0;margin-bottom:20px}
  .modal-overlay{position:absolute;inset:0;min-height:100%;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
  .modal{background:var(--surface);border:1px solid var(--border);padding:24px;max-width:380px;width:100%}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .modal-header h3{font-family:var(--font-display);font-size:19px;letter-spacing:.02em}
  .label-preview{border:1px solid var(--border);padding:18px;margin-bottom:18px;background:#fff;color:#000}
  .label-preview .pn-code{color:#000;font-size:13px;font-weight:600}
  .label-preview .title{font-size:11px;color:#333;margin:6px 0 10px}
  .label-preview .meta{font-size:9px;color:#555;margin-top:8px}
  .label-preview svg{width:100%}
  .toast{position:absolute;top:20px;right:20px;z-index:300;font-family:var(--font-ui);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;padding:12px 18px;border-left:3px solid;display:flex;align-items:center;gap:8px;background:var(--surface);box-shadow:0 4px 20px rgba(0,0,0,.15);animation:toast-in .25s var(--ease)}
  @keyframes toast-in{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
  .toast.success{border-color:var(--success);color:var(--success)}
  .toast.warning{border-color:var(--warning);color:var(--warning)}
  .toast.danger{border-color:var(--danger);color:var(--danger)}
  .toast svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
  .loading-screen{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text-faint)}
  .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--surface)}
  .login-card{background:var(--bg);border:1px solid var(--border);padding:32px;max-width:380px;width:100%}
  .login-card h2{font-family:var(--font-display);font-size:26px;letter-spacing:.02em;margin-bottom:6px}
  .login-card p.sub{font-size:13px;color:var(--text-dim);margin-bottom:22px}
  .worker-grid{display:grid;gap:8px;margin-bottom:20px}
  .worker-pill{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s}
  .worker-pill:hover{border-color:#999}
  .worker-pill.active{border-color:var(--red);background:rgba(214,43,43,.06)}
  .pin-dots{display:flex;gap:10px;justify-content:center;margin:20px 0}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border)}
  .pin-dot.filled{background:var(--red);border-color:var(--red)}
  .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .pin-key{padding:16px;font-family:var(--font-display);font-size:20px;border:1px solid var(--border);background:var(--surface);cursor:pointer;text-align:center}
  .pin-key:hover{background:var(--surface2)}
  .setup-link{display:block;text-align:center;margin-top:18px;font-size:12px;color:var(--text-faint);cursor:pointer;text-decoration:underline}
  .loading-screen svg{width:28px;height:28px;stroke:var(--text-faint);fill:none;stroke-width:2;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-screen p{font-family:var(--font-ui);font-size:12px;text-transform:uppercase;letter-spacing:.05em}
  .scan-overlay{position:absolute;inset:0;min-height:100%;background:rgba(0,0,0,.85);display:flex;align-items:flex-start;justify-content:center;z-index:300;padding:40px 20px;overflow-y:auto}
  .scan-station{background:var(--bg);border-radius:2px;max-width:560px;width:100%;padding:0}
  .scan-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border);background:var(--surface)}
  .scan-header h2{font-family:var(--font-display);font-size:22px;letter-spacing:.02em}
  .scan-body{padding:24px}
  .scan-input-wrap{position:relative;margin-bottom:8px}
  .scan-input-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:20px;height:20px;stroke:var(--text-faint);fill:none;stroke-width:2}
  #scan-input{font-family:'Courier New',monospace;font-size:18px;padding:16px 16px 16px 44px;border:2px solid var(--red);text-transform:uppercase}
  #scan-input:focus{outline:none;border-color:var(--red)}
  .scan-hint{font-size:12px;color:var(--text-faint);margin-bottom:20px}
  .scan-result{border:1px solid var(--border);padding:20px;margin-top:4px}
  .scan-result-pn{font-family:'Courier New',monospace;font-size:15px;font-weight:600;margin-bottom:4px}
  .scan-result-title{font-size:16px;font-weight:500;margin-bottom:14px}
  .scan-result-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;font-size:13px}
  .scan-result-meta div{color:var(--text-dim)}
  .scan-result-meta strong{color:var(--text);font-weight:500;display:block}
  .scan-not-found{text-align:center;padding:30px 20px;color:var(--text-faint)}
  .scan-not-found svg{width:32px;height:32px;stroke:var(--text-faint);fill:none;stroke-width:1.5;margin-bottom:10px}
  .sell-form{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .sell-form .field{grid-column:span 1}
  .sell-form .field.full{grid-column:span 2}
  .scan-history{margin-top:24px;border-top:1px solid var(--border);padding-top:16px}
  .scan-history-title{font-family:var(--font-ui);font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
  .scan-history-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--surface2);font-size:12.5px}
  .scan-history-item .h-pn{font-family:'Courier New',monospace;color:var(--text-dim)}
  .scan-history-item .h-price{color:var(--success);font-weight:500}
  .printer-status-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border:1px solid var(--border);margin-bottom:16px;font-size:12.5px}
  .printer-status-bar.connected{border-color:var(--success);background:rgba(31,128,85,.06)}
  .printer-status-bar .ps-label{display:flex;align-items:center;gap:8px;color:var(--text-dim)}
  .printer-status-bar .ps-dot{width:7px;height:7px;border-radius:50%;background:var(--text-faint)}
  .printer-status-bar.connected .ps-dot{background:var(--success)}
  .printer-status-bar .ps-meta{font-size:11px;color:var(--text-faint)}
  .btn-small{font-size:11px;padding:6px 12px}
  @media(max-width:640px){
    .field-grid,.field-grid.three{grid-template-columns:1fr}
    .topbar{padding:14px 18px}
    .main{padding:18px}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark"><svg viewBox="0 0 24 24"><path d="M3 7h11v8H3zM14 11h4l3 3v1h-7zM6 18a2 2 0 100-4 2 2 0 000 4zM17 18a2 2 0 100-4 2 2 0 000 4z" stroke-width="1.5"/></svg></div>
    <div class="brand-text"><h1>TRUCK PARTS TO GO</h1><p>Inventory system — synced across devices</p></div>
  </div>
  <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">
    <div class="sync-status"><span class="sync-dot" id="sync-dot"></span><span id="sync-label">Connecting...</span></div>
    <div class="sync-status" id="worker-indicator" style="display:none"></div>
    <div class="actions">
      <button class="btn primary" id="btn-scan"><svg viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2M7 12h10"/></svg>Scan to sell</button>
      <button class="btn" id="btn-refresh"><svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>Refresh</button>
      <button class="btn" id="btn-export"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Export CSV</button>
      <button class="btn" id="btn-add"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Add part</button>
      <button class="btn" id="btn-logout" style="display:none"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Switch worker</button>
    </div>
  </div>
</div>

<div id="login-screen" class="login-screen" style="display:none"></div>

<div class="main" id="main-content" style="display:none">
  <div id="loading-screen" class="loading-screen">
    <svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
    <p>Loading inventory...</p>
  </div>

  <div id="app-content" style="display:none">
    <div class="stats" id="stats"></div>

    <div id="view-list">
      <div class="filters">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="search-input" placeholder="Search part number, title, location...">
        </div>
        <select id="cat-filter"><option value="ALL">All categories</option></select>
        <select id="cond-filter"><option value="ALL">All conditions</option></select>
      </div>
      <div class="results-count" id="results-count"></div>
      <div id="table-area"></div>
    </div>

    <div id="view-form" style="display:none"></div>
  </div>
</div>

<div id="modal-root"></div>
<div id="toast-root"></div>

<script>

    if(f.ratio) segs.push(clean(f.ratio,5));
  } else {
    segs.push(clean(f.make,6), clean(f.model,8) || 'GEN');
  }

  segs.push(cond, src, seq);
  return segs.join('-');
}

function partTitle(p){
  var cat = findCat(p.category);
  var f = p.fields || {};
  var catName = cat ? cat.name : '';
  if(p.category === 'ENG'){
    return [f.make, f.model, f.hp ? f.hp+'HP' : ''].filter(Boolean).join(' ') || catName;
  }
  if(p.category === 'TRN'){
    return [f.make, f.model, f.speeds ? f.speeds+'spd' : ''].filter(Boolean).join(' ') || catName;
  }
  if(p.category === 'DFF'){
    return [f.make, f.ratio, catName].filter(Boolean).join(' ');
  }
  return [f.make, f.model, catName].filter(Boolean).join(' ');
}

/* ================= BACKEND CONFIG ================= */

var API_URL_KEY = 'tp2g-api-url';
var WORKER_SESSION_KEY = 'tp2g-worker-session';

function getApiUrl(){
  try{ return localStorage.getItem(API_URL_KEY) || ''; }catch(e){ return ''; }
}
function setApiUrl(url){
  try{ localStorage.setItem(API_URL_KEY, url); }catch(e){}
}
function getWorkerSession(){
  try{
    var raw = localStorage.getItem(WORKER_SESSION_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function setWorkerSession(session){
  try{ localStorage.setItem(WORKER_SESSION_KEY, JSON.stringify(session)); }catch(e){}
}
function clearWorkerSession(){
  try{ localStorage.removeItem(WORKER_SESSION_KEY); }catch(e){}
}

var currentWorker = null;
var currentWorkerPin = null;

/* ================= STORAGE (Google Sheets backend) ================= */

function setSyncStatus(s){
  var dot = document.getElementById('sync-dot');
  var label = document.getElementById('sync-label');
  if(!dot || !label) return;
  if(s === 'saving'){ dot.style.background='var(--warning)'; label.textContent='Saving...'; }
  else if(s === 'error'){ dot.style.background='var(--danger)'; label.textContent='Sync failed'; }
  else if(s === 'offline'){ dot.style.background='var(--text-faint)'; label.textContent='Offline'; }
  else { dot.style.background='var(--success)'; label.textContent='Synced'; }
}

function apiGet(action){
  var url = getApiUrl();
  if(!url) return Promise.reject(new Error('No API URL configured'));
  var qs = 'action=' + encodeURIComponent(action);
  if(action === 'getAll' && currentWorker){
    qs += '&workerId=' + encodeURIComponent(currentWorker.id) + '&pin=' + encodeURIComponent(currentWorkerPin || '');
  }
  return fetch(url + '?' + qs)
    .then(function(res){ return res.json(); });
}

function apiPost(body){
  var url = getApiUrl();
  if(!url) return Promise.reject(new Error('No API URL configured'));
  body.workerId = currentWorker ? currentWorker.id : null;
  body.pin = currentWorkerPin;
  return fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body)
  }).then(function(res){ return res.json(); });
}

function loadData(cb){
  setSyncStatus('saving');
  apiGet('getAll').then(function(data){
    if(data.error){
      setSyncStatus('error');
      showToast(data.error, 'danger');
      cb();
      return;
    }
    state.parts = (data.parts || []).map(normalizeIncomingPart);
    state.customersCache = data.customers || [];
    setSyncStatus('ok');
    cb();
  }).catch(function(err){
    setSyncStatus('offline');
    showToast('Could not reach the server \u2014 check your connection', 'danger');
    cb();
  });
}

function normalizeIncomingPart(p){
  return {
    id: p.id,
    category: p.category,
    fields: p.fields || {},
    condition: p.condition,
    source: p.source,
    seq: p.seq,
    location: p.location,
    price: p.price,
    notes: p.notes,
    sale: p.sale || null,
    createdAt: p.createdAt,
    updatedAt: p.updatedAt,
    updatedBy: p.updatedBy,
    minPrice: p.minPrice
  };
}

function saveData(cb){
  // saveData is now a no-op placeholder for legacy callers;
  // actual saves happen per-action via saveFormPart/deletePartRemote/logSaleRemote.
  // Kept so existing call sites don't break, but they should migrate to the
  // specific functions below for correctness with the backend.
  if(cb) cb();
}

function saveFormPart(form){
  var isEdit = !!form.id;
  apiPost({ action: 'savePart', part: form }).then(function(result){
    if(result.error){
      showToast(result.error, 'danger');
      return;
    }
    if(isEdit){
      state.parts = state.parts.map(function(p){ return p.id === form.id ? normalizeIncomingPart(result.part) : p; });
    } else {
      state.parts = [normalizeIncomingPart(result.part)].concat(state.parts);
    }
    showToast(isEdit ? 'Part updated' : 'Part added to inventory', 'success');
    closeForm();
    renderStats();
    renderTable();
  }).catch(function(){
    showToast('Save failed \u2014 check your connection', 'danger');
  });
}

function deletePartRemote(part, onDone){
  apiPost({ action: 'deletePart', partId: part.id }).then(function(result){
    if(result.error){
      showToast(result.error, 'danger');
      return;
    }
    state.parts = state.parts.filter(function(p){ return p.id !== part.id; });
    showToast('Part removed', 'warning');
    renderStats();
    renderTable();
    if(onDone) onDone();
  }).catch(function(){
    showToast('Delete failed \u2014 check your connection', 'danger');
  });
}

function logSaleRemote(part, sale, onDone){
  apiPost({ action: 'logSale', partId: part.id, sale: sale }).then(function(result){
    if(result.error){
      showToast(result.error, 'danger');
      return;
    }
    state.parts = state.parts.map(function(p){
      if(p.id === part.id) return Object.assign({}, p, { sale: sale });
      return p;
    });
    renderStats();
    renderTable();
    if(onDone) onDone();
  }).catch(function(){
    showToast('Could not log sale \u2014 check your connection', 'danger');
  });
}

/* ================= WORKER AUTH ================= */

function findOrCreateCustomerRemote(name, extra, cb){
  extra = extra || {};
  var existing = (state.customersCache || []).filter(function(c){
    return (c.name||'').toLowerCase() === (name||'').toLowerCase();
  })[0];
  if(existing){ cb(existing.id); return; }
  var customerPayload = Object.assign({ name: name }, extra);
  apiPost({ action: 'saveCustomer', customer: customerPayload }).then(function(result){
    if(result.error){ showToast(result.error, 'danger'); cb(null); return; }
    state.customersCache = state.customersCache || [];
    state.customersCache.push(result.customer);
    cb(result.customer.id);
  }).catch(function(){ showToast('Could not save customer', 'danger'); cb(null); });
}

function tryLogin(workerId, pin, onSuccess, onFail){
  var url = getApiUrl();
  if(!url){ onFail('No server connected yet'); return; }
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'login', workerId: workerId, pin: pin })
  }).then(function(res){ return res.json(); }).then(function(result){
    if(result.error){ onFail(result.error); return; }
    currentWorker = result.worker;
    currentWorkerPin = pin;
    setWorkerSession({ worker: result.worker, pin: pin });
    onSuccess(result.worker);
  }).catch(function(){ onFail('Could not reach the server'); });
}

function isAdmin(){
  return currentWorker && currentWorker.role === 'admin';
}

/* ================= TOAST ================= */

function showToast(msg, type){
  type = type || 'success';
  var root = document.getElementById('toast-root');
  var icon = type === 'danger' ? '<path d="M18 6L6 18M6 6l12 12"/>' : type === 'warning' ? '<path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>' : '<path d="M20 6L9 17l-5-5"/>';
  var el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = '<svg viewBox="0 0 24 24">' + icon + '</svg><span>' + escapeHtml(msg) + '</span>';
  root.innerHTML = '';
  root.appendChild(el);
  setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 2600);
}

/* ================= STATS ================= */

function renderStats(){
  var total = state.parts.length;
  var inStock = state.parts.filter(function(p){return !p.sale}).length;
  var sold = state.parts.filter(function(p){return p.sale && p.sale.status === 'paid'}).length;
  var pending = state.parts.filter(function(p){return p.sale && p.sale.status === 'partial'}).length;
  var revenue = state.parts.reduce(function(sum,p){ return sum + (p.sale ? paidSoFar(p.sale) : 0); }, 0);
  var owedTotal = state.parts.reduce(function(sum,p){ return sum + (p.sale && p.sale.status === 'partial' ? balanceOwed(p.sale) : 0); }, 0);
  var html = '';
  html += statCard('Total parts', total);
  html += statCard('In stock', inStock);
  html += statCard('Sold (paid)', sold);
  html += statCard('Pending payment', pending);
  html += statCard('Revenue collected', '$' + revenue.toLocaleString());
  if(owedTotal > 0) html += statCard('Balance owed to you', '$' + owedTotal.toLocaleString());
  document.getElementById('stats').innerHTML = html;
}
function statCard(label, value){
  var display = typeof value === 'number' ? value.toLocaleString() : value;
  return '<div class="stat-card"><div class="label">' + escapeHtml(label) + '</div><div class="value">' + escapeHtml(display) + '</div></div>';
}

/* ================= FILTERS ================= */

function populateFilters(){
  var catSel = document.getElementById('cat-filter');
  CATEGORIES.forEach(function(c){
    var opt = document.createElement('option');
    opt.value = c.code; opt.textContent = c.name;
    catSel.appendChild(opt);
  });
  var condSel = document.getElementById('cond-filter');
  CONDITIONS.forEach(function(c){
    var opt = document.createElement('option');
    opt.value = c.code; opt.textContent = c.label;
    condSel.appendChild(opt);
  });
}

/* ================= TABLE ================= */

function getFiltered(){
  return state.parts.filter(function(p){
    if(state.catFilter !== 'ALL' && p.category !== state.catFilter) return false;
    if(state.condFilter !== 'ALL' && p.condition !== state.condFilter) return false;
    if(state.search){
      var fieldVals = Object.values(p.fields || {}).join(' ');
      var haystack = (buildPartNumber(p) + ' ' + partTitle(p) + ' ' + fieldVals + ' ' + (p.notes||'') + ' ' + (p.location||'')).toLowerCase();
      if(haystack.indexOf(state.search.toLowerCase()) === -1) return false;
    }
    return true;
  }).sort(function(a,b){ return new Date(b.createdAt) - new Date(a.createdAt); });
}

function renderTable(){
  var filtered = getFiltered();
  document.getElementById('results-count').textContent = filtered.length + ' of ' + state.parts.length + ' parts';
  var area = document.getElementById('table-area');

  if(filtered.length === 0){
    area.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M3 7h11v8H3zM14 11h4l3 3v1h-7zM6 18a2 2 0 100-4 2 2 0 000 4zM17 18a2 2 0 100-4 2 2 0 000 4z" stroke-width="1.2"/></svg><p>' +
      (state.parts.length === 0 ? 'No parts in inventory yet — add your first part to get started' : 'No parts match your filters') + '</p></div>';
    return;
  }

  var showMinPrice = isAdmin();

  var rows = filtered.map(function(p){
    var cond = findCond(p.condition);
    var pn = buildPartNumber(p);
    var statusBadge = '<span class="badge success">In stock</span>';
    var priceDisplay = (p.price ? '$' + Number(p.price).toLocaleString() : '\u2014');
    if(p.sale){
      if(p.sale.status === 'paid'){
        statusBadge = '<span class="badge danger">Sold</span>';
        priceDisplay = '$' + Number(p.sale.totalPrice).toLocaleString() + ' (paid)';
      } else if(p.sale.status === 'partial'){
        statusBadge = '<span class="badge warning">Owed $' + balanceOwed(p.sale).toLocaleString() + '</span>';
        priceDisplay = '$' + Number(p.sale.totalPrice).toLocaleString() + ' (partial)';
      }
    }
    var minPriceCell = showMinPrice ? '<td style="color:var(--text-faint)">' + (p.minPrice ? '$' + Number(p.minPrice).toLocaleString() : '\u2014') + '</td>' : '';
    return '<tr>' +
      '<td><span class="pn-code">' + escapeHtml(pn) + '</span></td>' +
      '<td>' + escapeHtml(partTitle(p)) + '</td>' +
      '<td>' + statusBadge + '</td>' +
      '<td>' + escapeHtml(p.location || '\u2014') + '</td>' +
      '<td>' + priceDisplay + '</td>' +
      minPriceCell +
      '<td><div class="row-actions">' +
        '<button class="icon-btn" data-action="label" data-id="' + p.id + '" aria-label="Print label"><svg viewBox="0 0 24 24"><path d="M20.59 13.41L11 3.83A2 2 0 009.59 3.24L4 3a1 1 0 00-1 1l.24 5.59a2 2 0 00.59 1.41l9.58 9.58a2 2 0 002.82 0l4.36-4.36a2 2 0 000-2.82zM7 7h.01"/></svg></button>' +
        '<button class="icon-btn" data-action="edit" data-id="' + p.id + '" aria-label="Edit"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4z"/></svg></button>' +
        '<button class="icon-btn danger" data-action="delete" data-id="' + p.id + '" aria-label="Delete"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6"/></svg></button>' +
      '</div></td>' +
    '</tr>';
  }).join('');

  area.innerHTML = '<div class="table-wrap"><table><thead><tr>' +
    '<th>Part number</th><th>Title</th><th>Status</th><th>Location</th><th>Price</th>' + (showMinPrice ? '<th>Min. price</th>' : '') + '<th style="text-align:right">Actions</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table></div>';

  area.querySelectorAll('[data-action]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var id = btn.getAttribute('data-id');
      var action = btn.getAttribute('data-action');
      var part = state.parts.filter(function(p){return p.id===id})[0];
      if(action === 'label') openLabelModal(part);
      else if(action === 'edit') openForm(part);
      else if(action === 'delete') openDeleteConfirm(part);
    });
  });
}

/* ================= FORM ================= */

function openForm(part){
  document.getElementById('view-list').style.display = 'none';
  var formArea = document.getElementById('view-form');
  formArea.style.display = 'block';
  renderForm(formArea, part);
}
function closeForm(){
  document.getElementById('view-form').style.display = 'none';
  document.getElementById('view-list').style.display = 'block';
}

function defaultFieldsFor(catCode, existingFields){
  var fields = fieldsFor(catCode);
  var out = {};
  fields.forEach(function(f){
    out[f.key] = (existingFields && existingFields[f.key] !== undefined) ? existingFields[f.key] : '';
  });
  return out;
}

function renderForm(container, part){
  var isEdit = !!(part && part.id);
  var initialCat = (part && part.category) || 'ENG';
  var form = {
    category: initialCat,
    fields: defaultFieldsFor(initialCat, part && part.fields),
    condition: (part && part.condition) || 'A',
    source: (part && part.source) || 'YD',
    seq: (part && part.seq) || (state.parts.filter(function(p){ return p.category === initialCat; }).length + 1),
    location: (part && part.location) || '',
    price: (part && part.price) || '',
    notes: (part && part.notes) || '',
    id: part && part.id,
    createdAt: part && part.createdAt
  };

  function catGridHtml(){
    return CATEGORIES.map(function(c){
      return '<div class="cat-pill' + (form.category===c.code?' active':'') + '" data-code="' + c.code + '">' +
        '<div class="code">' + c.code + '</div><div class="name">' + escapeHtml(c.name) + '</div></div>';
    }).join('');
  }

  function fieldInputHtml(fieldDef, idx){
    var val = form.fields[fieldDef.key] || '';
    var fieldId = 'ff-' + idx;
    var labelExtra = fieldDef.optional ? '<span class="opt-tag">(optional)</span>' : '';
    var hintHtml = fieldDef.hint ? '<div class="hint">' + escapeHtml(fieldDef.hint) + '</div>' : '';

    var inputHtml = '';
    if(fieldDef.type === 'select'){
      var opts = '<option value="">Select...</option>' + fieldDef.options.map(function(o){
        return '<option value="' + escapeAttr(o) + '"' + (val===o?' selected':'') + '>' + escapeHtml(o) + '</option>';
      }).join('');
      inputHtml = '<select data-field="' + fieldDef.key + '" id="' + fieldId + '">' + opts + '</select>';
    } else if(fieldDef.type === 'combo'){
      var listId = fieldId + '-list';
      var suggestions = MAKE_SUGGESTIONS[fieldDef.source] || [];
      var datalistOpts = suggestions.map(function(o){ return '<option value="' + escapeAttr(o) + '">'; }).join('');
      inputHtml =
        '<input type="text" list="' + listId + '" data-field="' + fieldDef.key + '" id="' + fieldId + '" value="' + escapeAttr(val) + '" placeholder="' + escapeAttr(fieldDef.placeholder||'') + '">' +
        '<datalist id="' + listId + '">' + datalistOpts + '</datalist>';
    } else if(fieldDef.type === 'combo_dynamic'){
      var listId2 = fieldId + '-list';
      var depVal = form.fields[fieldDef.dependsOn] || '';
      var sourceMapObj = (fieldDef.sourceMap === 'TRANSMISSION_MODEL_SUGGESTIONS') ? TRANSMISSION_MODEL_SUGGESTIONS : {};
      var dynSuggestions = sourceMapObj[depVal] || [];
      var datalistOpts2 = dynSuggestions.map(function(o){ return '<option value="' + escapeAttr(o) + '">'; }).join('');
      inputHtml =
        '<input type="text" list="' + listId2 + '" data-field="' + fieldDef.key + '" id="' + fieldId + '" value="' + escapeAttr(val) + '" placeholder="' + escapeAttr(fieldDef.placeholder||'') + '">' +
        '<datalist id="' + listId2 + '">' + datalistOpts2 + '</datalist>';
    } else if(fieldDef.type === 'number'){
      inputHtml = '<input type="number" data-field="' + fieldDef.key + '" id="' + fieldId + '" value="' + escapeAttr(val) + '">';
    } else {
      inputHtml = '<input type="text" data-field="' + fieldDef.key + '" id="' + fieldId + '" value="' + escapeAttr(val) + '" placeholder="' + escapeAttr(fieldDef.placeholder||'') + '">';
    }

    return '<div class="field"><label>' + escapeHtml(fieldDef.label) + labelExtra + '</label>' + inputHtml + hintHtml + '</div>';
  }

  function dynamicFieldsHtml(){
    var fields = fieldsFor(form.category);
    var rows = fields.map(function(f, idx){ return fieldInputHtml(f, idx); });
    var html = '<div class="field-grid">';
    var out = '';
    for(var i = 0; i < rows.length; i += 2){
      out += '<div class="field-grid">' + rows[i] + (rows[i+1] || '') + '</div>';
    }
    return out;
  }

  function fullHtml(){
    var pn = buildPartNumber(form);
    return '<div class="form-card">' +
      '<div class="form-header"><h2>' + (isEdit?'Edit part':'Add new part') + '</h2>' +
        '<button class="icon-btn" id="form-close" aria-label="Close"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>' +
      '<div class="pn-preview"><div class="pn-label">Generated part number</div><div class="pn-value" id="pn-preview-value">' + escapeHtml(pn) + '</div></div>' +
      '<span class="section-label">Category</span>' +
      '<div class="cat-grid" id="cat-grid">' + catGridHtml() + '</div>' +
      '<div class="dynamic-fields-section" id="dynamic-fields">' + dynamicFieldsHtml() + '</div>' +
      '<div class="field-grid three">' +
        '<div class="field"><label>Condition</label><select id="f-condition">' +
          CONDITIONS.map(function(c){ return '<option value="' + c.code + '"' + (form.condition===c.code?' selected':'') + '>' + escapeHtml(c.label) + '</option>'; }).join('') +
        '</select></div>' +
        '<div class="field"><label>Source</label><select id="f-source">' +
          SOURCES.map(function(s){ return '<option value="' + s.code + '"' + (form.source===s.code?' selected':'') + '>' + escapeHtml(s.label) + '</option>'; }).join('') +
        '</select></div>' +
        '<div class="field"><label>Sequence #</label><input type="number" id="f-seq" min="1" value="' + form.seq + '"></div>' +
      '</div>' +
      '<div class="field-grid">' +
        '<div class="field"><label>Yard location</label><input type="text" id="f-location" value="' + escapeAttr(form.location) + '" placeholder="A-3-2"><div class="hint">e.g. Row A, Shelf 3</div></div>' +
        '<div class="field"><label>Asking price ($)</label><input type="number" id="f-price" value="' + escapeAttr(form.price) + '" placeholder="2500"></div>' +
      '</div>' +
      (isAdmin() ?
        '<div class="field-grid">' +
          '<div class="field"><label>Internal minimum price ($) <span class="opt-tag">admin only \u2014 not shown to workers or exports</span></label>' +
          '<input type="number" id="f-min-price" value="' + escapeAttr(form.minPrice||'') + '" placeholder="e.g. 1800" style="border-color:var(--text-faint)"></div>' +
        '</div>' : ''
      ) +
      '<div class="field"><label>Notes</label><textarea id="f-notes" rows="2" placeholder="Additional details, defects, etc.">' + escapeHtml(form.notes) + '</textarea></div>' +
      '<div class="form-footer">' +
        '<button class="btn" id="form-cancel">Cancel</button>' +
        '<button class="btn primary" id="form-save"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>' + (isEdit?'Save changes':'Add to inventory') + '</button>' +
      '</div></div>';
  }

  container.innerHTML = fullHtml();

  function readFormValues(){
    container.querySelectorAll('[data-field]').forEach(function(el){
      form.fields[el.getAttribute('data-field')] = el.value;
    });
    form.condition = document.getElementById('f-condition').value;
    form.source = document.getElementById('f-source').value;
    form.seq = parseInt(document.getElementById('f-seq').value) || 1;
    form.location = document.getElementById('f-location').value;
    form.price = document.getElementById('f-price').value;
    form.notes = document.getElementById('f-notes').value;
    var minPriceEl = document.getElementById('f-min-price');
    if(minPriceEl) form.minPrice = minPriceEl.value;
  }

  function updatePreview(){
    readFormValues();
    document.getElementById('pn-preview-value').textContent = buildPartNumber(form);
  }

  document.getElementById('form-close').addEventListener('click', closeForm);
  document.getElementById('form-cancel').addEventListener('click', closeForm);

  container.querySelectorAll('#cat-grid .cat-pill').forEach(function(pill){
    pill.addEventListener('click', function(){
      readFormValues();
      form.category = pill.getAttribute('data-code');
      form.fields = defaultFieldsFor(form.category, null);
      if(!isEdit){
        form.seq = state.parts.filter(function(p){ return p.category === form.category; }).length + 1;
      }
      renderForm(container, Object.assign({}, form, {fields: form.fields}));
    });
  });

  container.querySelectorAll('input, select, textarea').forEach(function(el){
    el.addEventListener('input', updatePreview);
    el.addEventListener('change', function(){
      updatePreview();
      // if a transmission make changed, refresh model suggestions dynamically
      if(el.getAttribute('data-field') === 'make' && form.category === 'TRN'){
        readFormValues();
        setTimeout(function(){
          renderForm(container, Object.assign({}, form));
        }, 0);
      }
    });
  });

  document.getElementById('form-save').addEventListener('click', function(){
    readFormValues();
    saveFormPart(form);
  });
}

/* ================= DELETE CONFIRM ================= */

function openDeleteConfirm(part){
  if(!isAdmin()){
    showToast('Only an admin can delete parts', 'danger');
    return;
  }
  var root = document.getElementById('modal-root');

    '<div class="modal-header"><h3>Purchase history</h3>' +

    '</div></div>';

  document.getElementById('history-overlay').addEventListener('click', function(e){ if(e.target.id === 'history-overlay') closeModal(); });

  var qs = 'action=getCustomerHistory&customerId=' + encodeURIComponent(customerId) +
    '&workerId=' + encodeURIComponent(currentWorker.id) + '&pin=' + encodeURIComponent(currentWorkerPin || '');

function renderCustomerHistory(data){
  var body = document.getElementById('history-body');
  if(!body) return;
  if(data.error){
    body.innerHTML = '<p style="font-size:13px;color:var(--danger)">' + escapeHtml(data.error) + '</p>';

  }

  var c = data.customer;

  var summaryHtml =

      '<div style="font-size:16px;font-weight:500">' + escapeHtml(c.name) + '</div>' +
      (c.phone ? '<div style="font-size:12.5px;color:var(--text-dim)">' + escapeHtml(c.phone) + '</div>' : '') +
      (addressLine ? '<div style="font-size:12.5px;color:var(--text-dim)">' + escapeHtml(addressLine) + '</div>' : '') +
    '</div>' +
    '<div class="scan-result-meta" style="margin-bottom:16px">' +
      '<div>Total purchases<strong>' + data.purchaseCount + '</strong></div>' +
      '<div>Total paid<strong>$' + Number(data.totalPaid).toLocaleString() + '</strong></div>' +
      (data.totalOwed > 0 ? '<div>Balance owed<strong style="color:var(--danger)">$' + Number(data.totalOwed).toLocaleString() + '</strong></div>' : '') +
    '</div>';

  var historyItems = data.purchases.map(function(p){
    var statusColor = p.status === 'paid' ? 'var(--success)' : 'var(--warning)';
    var titleText = [p.fields && p.fields.make, p.fields && p.fields.model, p.category].filter(Boolean).join(' ');
    return '<div class="scan-history-item" style="flex-direction:column;align-items:flex-start;gap:2px">' +
      '<div style="display:flex;justify-content:space-between;width:100%">' +
        '<span style="font-weight:500">' + escapeHtml(titleText || p.category) + '</span>' +
        '<span style="color:' + statusColor + '">$' + Number(p.totalPrice).toLocaleString() + '</span>' +
      '</div>' +
      '<div style="font-size:11px;color:var(--text-faint)">' + escapeHtml(p.date || '') + ' \u00b7 ' + escapeHtml(p.channel || '') + (p.owed > 0 ? ' \u00b7 $' + Number(p.owed).toLocaleString() + ' owed' : '') + '</div>' +
    '</div>';
  }).join('');

    '<div class="scan-history-title">Purchases</div>' +
    (historyItems || '<p style="font-size:13px;color:var(--text-faint)">No purchases yet</p>');
}

/* ================= SCAN TO SELL ================= */


function findPartByPN(pn){
  var clean = (pn || '').trim().toUpperCase();
  return state.parts.filter(function(p){ return buildPartNumber(p).toUpperCase() === clean; })[0];
}

function openScanStation(){

  root.innerHTML =
    '<div class="scan-overlay" id="scan-overlay">' +
      '<div class="scan-station">' +
        '<div class="scan-header"><h2>Scan to sell</h2>' +

        '<div class="scan-body">' +
          '<div class="scan-input-wrap"><svg viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2M7 12h10"/></svg>' +
            '<input type="text" id="scan-input" placeholder="Scan or type part number" autocomplete="off"></div>' +
          '<p class="scan-hint">Point the scanner at the label, or click the box and scan — it acts like a keyboard and submits automatically.</p>' +
          '<div id="scan-result-area"></div>' +

    if(e.key === 'Enter'){

    }

function handleScan(rawValue){
  var area = document.getElementById('scan-result-area');
  var part = findPartByPN(rawValue);

  if(!part){
    area.innerHTML = '<div class="scan-not-found"><svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>' +
      '<p>No part found matching "' + escapeHtml(rawValue) + '". Check the scan or try typing the part number.</p></div>';
    return;
  }

  if(part.sale && part.sale.status === 'paid'){
    area.innerHTML = '<div class="scan-result">' +
      '<div class="scan-result-pn">' + escapeHtml(buildPartNumber(part)) + '</div>' +
      '<div class="scan-result-title">' + escapeHtml(partTitle(part)) + '</div>' +
      '<p style="font-size:13px;color:var(--warning)">This part is already sold and fully paid (' + escapeHtml(part.sale.channel||'') + ', $' + Number(part.sale.totalPrice||0).toLocaleString() + ').</p>' +
    '</div>';
    return;
  }

  if(part.sale && part.sale.status === 'partial'){
    renderBalanceDueView(area, part);
    return;
  }

  renderNewSaleForm(area, part);
}

function paidSoFar(sale){
  if(!sale || !sale.payments) return 0;
  return sale.payments.reduce(function(sum, p){ return sum + (parseFloat(p.amount)||0); }, 0);
}
function balanceOwed(sale){
  return Math.max(0, (parseFloat(sale.totalPrice)||0) - paidSoFar(sale));
}

function customerOptionsHtml(selectedId){
  var customers = state.customersCache || [];
  var opts = '<option value="__new">+ New customer</option>';
  customers.forEach(function(c){

  });
  return opts;
}

function logNewSale(part){
  var totalPrice = parseFloat(document.getElementById('sell-price').value) || 0;
  var date = document.getElementById('sell-date').value || new Date().toISOString().slice(0,10);
  var channel = document.getElementById('sell-channel').value;
  var paymentType = document.getElementById('sell-payment-type').value;
  var paymentMethod = document.getElementById('sell-payment-method').value;
  var paidAmount = totalPrice;

  function finishSale(customerId){
    if(paymentType === 'split' && paidAmount > totalPrice){
      showToast('Amount paid can\'t exceed the sale price', 'danger');
      return;
    }
    var sale = {
      totalPrice: totalPrice,
      date: date,
      channel: channel,
      customerId: customerId,
      payments: [{ amount: paidAmount, method: paymentMethod, date: date }],
      status: (paymentType === 'split' && paidAmount < totalPrice) ? 'partial' : 'paid'
    };

    logSaleRemote(part, sale, function(){
      pushScanHistory({ pn: buildPartNumber(part), price: paidAmount, channel: channel, status: sale.status });
      var msg = sale.status === 'partial'
        ? 'Sale logged \u2014 $' + balanceOwed(sale).toLocaleString() + ' still owed'
        : 'Sale logged \u2014 ' + buildPartNumber(part);
      showToast(msg, sale.status === 'partial' ? 'warning' : 'success');
      document.getElementById('scan-result-area').innerHTML = '';
      document.getElementById('scan-input').value = '';
      document.getElementById('scan-input').focus();
      renderScanHistory();
    });
  }

  if(paymentType === 'split'){
    var custSelect = document.getElementById('sell-customer-select');
    paidAmount = parseFloat(document.getElementById('sell-deposit').value) || 0;
    if(custSelect.value === '__new'){
      var name = document.getElementById('sell-customer-name').value.trim();
      if(!name){
        showToast('Enter a customer name for split payments', 'danger');
        return;
      }
      var customerExtra = {
        phone: document.getElementById('sell-customer-phone').value.trim(),
        street: document.getElementById('sell-customer-street').value.trim(),
        city: document.getElementById('sell-customer-city').value.trim(),
        state: document.getElementById('sell-customer-state').value.trim(),
        zip: document.getElementById('sell-customer-zip').value.trim()
      };
      findOrCreateCustomerRemote(name, customerExtra, function(customerId){
        if(!customerId) return;
        finishSale(customerId);
      });
    } else {
      finishSale(custSelect.value);
    }
  } else {
    finishSale(null);
  }
}

function renderBalanceDueView(area, part){
  var sale = part.sale;
  var owed = balanceOwed(sale);
  var customer = sale.customerId ? getCustomer(sale.customerId) : null;
  var paymentsHtml = sale.payments.map(function(p){
    return '<div class="scan-history-item"><span>' + escapeHtml(p.method) + ' \u00b7 ' + escapeHtml(p.date) + '</span><span class="h-price">$' + Number(p.amount).toLocaleString() + '</span></div>';
  }).join('');

  area.innerHTML = '<div class="scan-result">' +
    '<div class="scan-result-pn">' + escapeHtml(buildPartNumber(part)) + '</div>' +
    '<div class="scan-result-title">' + escapeHtml(partTitle(part)) + '</div>' +
    '<p style="font-size:13px;color:var(--text-dim);margin-bottom:6px">Customer: <strong>' + escapeHtml(customer?customer.name:'Unknown') + '</strong>' + (customer&&customer.phone ? ' \u00b7 ' + escapeHtml(customer.phone) : '') +
      (customer ? ' \u00b7 <span class="setup-link" id="balance-history-link" style="display:inline">Full history</span>' : '') + '</p>' +
    '<div class="scan-result-meta" style="margin-bottom:10px">' +
      '<div>Total price<strong>$' + Number(sale.totalPrice).toLocaleString() + '</strong></div>' +
      '<div>Balance owed<strong style="color:var(--danger)">$' + owed.toLocaleString() + '</strong></div>' +
    '</div>' +
    '<div class="scan-history-title" style="margin-top:0">Payments so far</div>' + paymentsHtml +
    '<div class="field-grid" style="margin-top:16px">' +
      '<div class="field"><label>Additional payment ($)</label><input type="number" id="extra-payment" placeholder="' + owed + '"></div>' +
      '<div class="field"><label>Payment method</label><select id="extra-payment-method">' +
        PAYMENT_METHODS.map(function(m){ return '<option value="' + escapeAttr(m) + '">' + escapeHtml(m) + '</option>'; }).join('') +
      '</select></div>' +
    '</div>' +
    '<button class="btn primary" id="log-payment-btn" style="width:100%;justify-content:center;margin-top:6px">' +
      '<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2"><path d="M20 6L9 17l-5-5"/></svg>Log this payment</button>' +
  '</div>';

  document.getElementById('log-payment-btn').addEventListener('click', function(){
    var amount = parseFloat(document.getElementById('extra-payment').value) || 0;
    var method = document.getElementById('extra-payment-method').value;
    if(amount <= 0){ showToast('Enter a payment amount', 'danger'); return; }
    if(amount > owed){ showToast('Payment exceeds remaining balance of $' + owed.toLocaleString(), 'danger'); return; }

    var newSale = Object.assign({}, sale);
    newSale.payments = sale.payments.concat([{ amount: amount, method: method, date: new Date().toISOString().slice(0,10) }]);
    newSale.status = balanceOwed(newSale) <= 0 ? 'paid' : 'partial';

    logSaleRemote(part, newSale, function(){
      var stillOwed = balanceOwed(newSale);
      showToast(stillOwed > 0 ? '$' + amount.toLocaleString() + ' logged \u2014 $' + stillOwed.toLocaleString() + ' still owed' : 'Paid in full', stillOwed > 0 ? 'warning' : 'success');
      document.getElementById('scan-result-area').innerHTML = '';
      document.getElementById('scan-input').value = '';
      document.getElementById('scan-input').focus();
    });
  });

  var historyLink = document.getElementById('balance-history-link');
  if(historyLink && customer){
    historyLink.addEventListener('click', function(){ openCustomerHistory(customer.id); });
  }
}

var SCAN_HISTORY_KEY = 'tp2g-scan-history-v1';
function pushScanHistory(entry){
  var history = [];
  try{ history = JSON.parse(localStorage.getItem(SCAN_HISTORY_KEY) || '[]'); }catch(e){}
  history.unshift(entry);
  history = history.slice(0, 10);
  try{ localStorage.setItem(SCAN_HISTORY_KEY, JSON.stringify(history)); }catch(e){}
}
function renderScanHistory(){
  var historyArea = document.getElementById('scan-history-area');
  if(!historyArea) return;
  var history = [];
  try{ history = JSON.parse(localStorage.getItem(SCAN_HISTORY_KEY) || '[]'); }catch(e){}
  if(history.length === 0){ historyArea.innerHTML = ''; return; }
  var items = history.map(function(h){
    return '<div class="scan-history-item"><span class="h-pn">' + escapeHtml(h.pn) + '</span><span>' + escapeHtml(h.channel) + '</span><span class="h-price">$' + Number(h.price).toLocaleString() + '</span></div>';
  }).join('');
  historyArea.innerHTML = '<div class="scan-history-title">Recently logged sales</div>' + items;
}

/* ================= BRADY M211 PRINTER ================= */

var bradyPrinter = {
  sdk: null,
  connected: false,
  status: {}
};

function bradyInit(){
  if(typeof window.BradySdk === 'undefined'){
    return false;
  }
  if(!bradyPrinter.sdk){
    bradyPrinter.sdk = new window.BradySdk(function(updates){
      bradyOnUpdate(updates);
    });
  }
  return true;
}

function bradyOnUpdate(updates){
  if(!bradyPrinter.sdk) return;
  bradyPrinter.status = {
    printerName: bradyPrinter.sdk.printerName,
    printerModel: bradyPrinter.sdk.printerModel,
    batteryLevelPercentage: bradyPrinter.sdk.batteryLevelPercentage,
    supplyRemainingPercentage: bradyPrinter.sdk.supplyRemainingPercentage,
    status: bradyPrinter.sdk.status
  };
  bradyPrinter.connected = bradyPrinter.sdk.isConnected ? bradyPrinter.sdk.isConnected() : false;
  refreshPrinterStatusBar();
}

function refreshPrinterStatusBar(){
  var bar = document.getElementById('printer-status-bar');
  if(!bar) return;
  if(bradyPrinter.connected){
    bar.className = 'printer-status-bar connected';
    bar.innerHTML =
      '<div class="ps-label"><span class="ps-dot"></span>Brady ' + escapeHtml(bradyPrinter.status.printerModel || 'M211') + ' connected' +
        (bradyPrinter.status.batteryLevelPercentage != null ? ' \u00b7 ' + Math.round(bradyPrinter.status.batteryLevelPercentage) + '% battery' : '') +
      '</div>' +
      '<button class="btn btn-small" id="brady-disconnect-btn">Disconnect</button>';
    var dcBtn = document.getElementById('brady-disconnect-btn');
    if(dcBtn) dcBtn.addEventListener('click', bradyDisconnect);
  } else {
    bar.className = 'printer-status-bar';
    bar.innerHTML =
      '<div class="ps-label"><span class="ps-dot"></span>Brady M211 not connected</div>' +
      '<button class="btn btn-small" id="brady-connect-btn">Connect printer</button>';
    var connBtn = document.getElementById('brady-connect-btn');
    if(connBtn) connBtn.addEventListener('click', bradyConnect);
  }
}

function bradyConnect(){
  if(!bradyInit()){
    showToast('Brady SDK not available in this browser', 'danger');
    return;
  }
  if(bradyPrinter.sdk.isSupportedBrowser && !bradyPrinter.sdk.isSupportedBrowser()){
    showToast('This browser doesn\'t support Bluetooth printing \u2014 use Chrome or Edge', 'danger');
    return;
  }
  var savedId = null;
  try{ savedId = localStorage.getItem('tp2g-brady-ownership-id'); }catch(e){}

  bradyPrinter.sdk.showDiscoveredBleDevices(savedId).then(function(id){
    if(id){
      try{ localStorage.setItem('tp2g-brady-ownership-id', id); }catch(e){}
      bradyPrinter.connected = true;
      bradyOnUpdate();
      showToast('Brady M211 connected', 'success');
    } else {
      showToast('Connection cancelled or failed', 'warning');
    }
  }).catch(function(){
    showToast('Could not connect to printer', 'danger');
  });
}

function bradyDisconnect(){
  if(!bradyPrinter.sdk) return;
  bradyPrinter.sdk.disconnect().then(function(){
    bradyPrinter.connected = false;
    refreshPrinterStatusBar();
    showToast('Printer disconnected', 'warning');
  });
}

// Fixed label spec: 0.75in x 2.919in, printed at 300 DPI for crisp thermal output
var LABEL_DPI = 300;
var LABEL_WIDTH_IN = 2.919;
var LABEL_HEIGHT_IN = 0.75;

function getRealLabelDimensions(){
  var sdk = bradyPrinter.sdk;
  if(!sdk) return null;
  var w = sdk.substrateWidth;
  var h = sdk.substrateHeight;
  if(w && h && w > 0 && h > 0){
    return { width: w, height: h };
  }
  return null;
}

function buildLabelCanvas(pn, title, condLabel){
  return new Promise(function(resolve){
    var real = getRealLabelDimensions();
    var widthIn = (real && real.width) || LABEL_WIDTH_IN;
    var heightIn = (real && real.height) || LABEL_HEIGHT_IN;

    var canvasW = Math.round(widthIn * LABEL_DPI);
    var canvasH = Math.round(heightIn * LABEL_DPI);

    var canvas = document.createElement('canvas');
    canvas.width = canvasW;
    canvas.height = canvasH;
    var ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvasW, canvasH);
    ctx.fillStyle = '#000';
    ctx.textBaseline = 'top';

    var padX = Math.round(canvasW * 0.025);

    // 3 rows, roughly: PN (28%) / barcode (46%) / title+condition (26%)
    var row1H = Math.round(canvasH * 0.28);
    var row2H = Math.round(canvasH * 0.46);
    var row3H = canvasH - row1H - row2H;

    // Row 1 - Part number, sized to fit the FULL string on one line (never truncated)
    var pnMaxFontSize = Math.round(row1H * 0.78);
    var pnFontSize = fitMonospaceFontSize(ctx, pn, canvasW - padX * 2, pnMaxFontSize, 14);
    ctx.font = 'bold ' + pnFontSize + 'px monospace';
    ctx.fillText(pn, padX, Math.round((row1H - pnFontSize) / 2) - 2);

    // Row 2 - Barcode, full width, sized to fill its row height
    var row2Y = row1H;
    drawBarcodeOnCanvas(ctx, pn, padX, row2Y, canvasW - padX * 2, row2H, function(){

      // Row 3 - Title (left) + condition (right), single line each, small font
      var row3Y = row1H + row2H;
      var row3FontSize = Math.max(9, Math.round(row3H * 0.62));
      ctx.font = row3FontSize + 'px sans-serif';
      var titleY = row3Y + Math.round((row3H - row3FontSize) / 2) - 1;

      var condText = (condLabel || '').toUpperCase();
      var condWidth = condText ? ctx.measureText(condText).width : 0;
      var titleMaxWidth = canvasW - padX * 2 - condWidth - (condText ? 14 : 0);
      var titleFitted = fitTextToWidth(ctx, title, titleMaxWidth);
      ctx.fillText(titleFitted, padX, titleY);

      if(condText){
        ctx.font = 'bold ' + row3FontSize + 'px sans-serif';
        ctx.fillText(condText, canvasW - padX - condWidth, titleY);
      }

      resolve(canvas);
    });
  });
}

function drawBarcodeFallback(ctx, x, y, w, h){
  ctx.save();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
  ctx.font = Math.round(h * 0.3) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('barcode unavailable', x + w / 2, y + h / 2);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.restore();
}

function fitMonospaceFontSize(ctx, text, maxWidth, maxFontSize, minFontSize){
  var size = maxFontSize;
  while(size > minFontSize){
    ctx.font = 'bold ' + size + 'px monospace';
    if(ctx.measureText(text).width <= maxWidth) return size;
    size -= 1;
  }
  return minFontSize;
}

function fitTextToWidth(ctx, text, maxWidth){
  text = text || '';
  if(ctx.measureText(text).width <= maxWidth) return text;
  var truncated = text;
  while(truncated.length > 1 && ctx.measureText(truncated + '\u2026').width > maxWidth){
    truncated = truncated.slice(0, -1);
  }
  return truncated + '\u2026';
}

function drawBarcodeOnCanvas(ctx, pn, x, y, w, h, callback){
  if(typeof JsBarcode === 'undefined'){
    drawBarcodeFallback(ctx, x, y, w, h);
    callback();
    return;
  }

  var barcodeSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  barcodeSvg.setAttribute('id', 'temp-brady-barcode');
  document.body.appendChild(barcodeSvg);

  var barcodeOk = true;
  // No human-readable text under the bars (fontSize:0) - row 1 already shows the part number larger
  try{
    JsBarcode(barcodeSvg, pn, { format:'CODE128', width:2, height:Math.round(h*0.92), displayValue:false, margin:0 });
  }catch(e){
    barcodeOk = false;
  }

  if(!barcodeOk || !barcodeSvg.childNodes.length){
    document.body.removeChild(barcodeSvg);
    drawBarcodeFallback(ctx, x, y, w, h);
    callback();
    return;
  }

  var svgData = new XMLSerializer().serializeToString(barcodeSvg);
  var svgBlob = new Blob([svgData], {type:'image/svg+xml'});
  var url = URL.createObjectURL(svgBlob);
  var img = new Image();
  img.onerror = function(){
    URL.revokeObjectURL(url);
    document.body.removeChild(barcodeSvg);
    drawBarcodeFallback(ctx, x, y, w, h);
    callback();
  };
  img.onload = function(){
    var imgRatio = img.width / img.height;
    var drawH = h;
    var drawW = drawH * imgRatio;
    if(drawW > w){
      drawW = w;
      drawH = drawW / imgRatio;
    }
    var drawX = x + Math.round((w - drawW) / 2);
    var drawY = y + Math.round((h - drawH) / 2);
    ctx.drawImage(img, drawX, drawY, drawW, drawH);
    URL.revokeObjectURL(url);
    document.body.removeChild(barcodeSvg);
    callback();
  };
  img.src = url;
}

function bradyPrintLabel(pn, title, condLabel){
  if(!bradyPrinter.connected || !bradyPrinter.sdk){
    showToast('Printer not connected', 'danger');
    return;
  }
  buildLabelCanvas(pn, title, condLabel).then(function(canvas){
    var img = document.createElement('img');
    img.onload = function(){
      bradyPrinter.sdk.printBitmap(img).then(function(success){
        showToast(success ? 'Sent to Brady M211' : 'Print failed', success ? 'success' : 'danger');
      }).catch(function(){
        showToast('Print failed', 'danger');
      });
    };
    img.src = canvas.toDataURL('image/png');
  });
}

/* ================= LABEL MODAL ================= */

function openLabelModal(part){
  var root = document.getElementById('modal-root');
  var pn = buildPartNumber(part);
  var title = partTitle(part);
  var cond = findCond(part.condition);

  bradyInit();

  root.innerHTML = '<div class="modal-overlay" id="label-overlay"><div class="modal">' +
    '<div class="modal-header"><h3>Print label</h3>' +
      '<button class="icon-btn" id="label-close" aria-label="Close"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>' +
    '<div class="printer-status-bar" id="printer-status-bar"></div>' +
    '<div class="label-preview" style="display:flex;align-items:center;justify-content:center;padding:14px"><img id="label-preview-img" alt="' + escapeAttr(pn) + '" style="width:100%;max-width:340px;border:1px solid var(--border)"></div>' +
    '<p style="font-size:10.5px;color:var(--text-faint);text-align:center;margin:-4px 0 14px">0.75in \u00d7 2.919in label</p>' +
    '<button class="btn primary" id="label-print-brady" style="width:100%;justify-content:center;margin-bottom:8px">' +
      '<svg viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg>Print to Brady M211</button>' +
    '<button class="btn" id="label-print" style="width:100%;justify-content:center">' +
      '<svg viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg>Print via browser dialog</button>' +
    '</div></div>';

  buildLabelCanvas(pn, title, cond?cond.label:'').then(function(canvas){
    var imgEl = document.getElementById('label-preview-img');
    if(imgEl) imgEl.src = canvas.toDataURL('image/png');
  });

  refreshPrinterStatusBar();

  document.getElementById('label-close').addEventListener('click', closeModal);
  document.getElementById('label-overlay').addEventListener('click', function(e){ if(e.target.id === 'label-overlay') closeModal(); });

  document.getElementById('label-print-brady').addEventListener('click', function(){
    if(!bradyPrinter.connected){
      showToast('Connect the Brady M211 first using the button above', 'warning');
      return;
    }
    bradyPrintLabel(pn, title, cond?cond.label:'');
  });

  document.getElementById('label-print').addEventListener('click', function(){
    buildLabelCanvas(pn, title, cond?cond.label:'').then(function(canvas){
      var imgData = canvas.toDataURL('image/png');
      var w = window.open('', '_blank');
      w.document.write(
        '<html><head><title>Label - ' + pn + '</title><style>' +
        'body{margin:0;padding:10px;display:flex;align-items:center;justify-content:center}' +
        'img{width:' + LABEL_WIDTH_IN + 'in;height:' + LABEL_HEIGHT_IN + 'in;image-rendering:crisp-edges}' +
        '@media print{ body{padding:0} }' +
        '</style></head><body onload="window.print()">' +
        '<img src="' + imgData + '" alt="' + pn + '">' +
        '</body></html>'
      );
      w.document.close();
    });
  });
}


/* ================= CSV EXPORT ================= */

function exportCSV(){
  var filtered = getFiltered();
  var allFieldKeys = {};
  filtered.forEach(function(p){
    Object.keys(p.fields || {}).forEach(function(k){ allFieldKeys[k] = true; });
  });
  var fieldKeyList = Object.keys(allFieldKeys);

  var headers = ['Part Number','Category','Title','Condition','Source','Location','Price','Notes','Date Added'].concat(fieldKeyList);
  var rows = filtered.map(function(p){
    var cat = findCat(p.category);
    var cond = findCond(p.condition);
    var src = findSource(p.source);
    var base = [
      buildPartNumber(p),
      cat ? cat.name : p.category,
      partTitle(p),
      cond ? cond.label : p.condition,
      src ? src.label : p.source,
      p.location || '',
      p.price || '',
      (p.notes || '').replace(/,/g,';'),
      p.createdAt ? new Date(p.createdAt).toLocaleDateString() : ''
    ];
    fieldKeyList.forEach(function(k){
      base.push((p.fields && p.fields[k]) || '');
    });
    return base;
  });
  var csv = [headers].concat(rows).map(function(r){
    return r.map(function(c){ return '"' + String(c).replace(/"/g,'""') + '"'; }).join(',');
  }).join('\n');
  var blob = new Blob([csv], {type:'text/csv'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'inventory-export-' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Exported ' + filtered.length + ' parts to CSV', 'success');
}

/* ================= LOGIN / SERVER SETUP SCREENS ================= */

function showServerSetupScreen(){
  var screen = document.getElementById('login-screen');
  screen.style.display = 'flex';
  document.getElementById('main-content').style.display = 'none';
  screen.innerHTML =
    '<div class="login-card">' +
      '<h2>Connect to server</h2>' +
      '<p class="sub">Paste the Google Apps Script Web App URL from your Sheet setup.</p>' +
      '<div class="field"><label>API URL</label><input type="text" id="setup-url" placeholder="https://script.google.com/macros/s/.../exec"></div>' +
      '<button class="btn primary" id="setup-save" style="width:100%;justify-content:center;margin-top:14px">Connect</button>' +
      '<p id="setup-error" style="color:var(--danger);font-size:12px;margin-top:10px;display:none"></p>' +
    '</div>';

  document.getElementById('setup-save').addEventListener('click', function(){
    var url = document.getElementById('setup-url').value.trim();
    if(!url){ return; }
    setApiUrl(url);
    var errEl = document.getElementById('setup-error');
    fetch(url + '?action=ping').then(function(r){ return r.json(); }).then(function(data){
      if(data.error){
        errEl.textContent = data.error;
        errEl.style.display = 'block';
        return;
      }
      showWorkerLoginScreen();
    }).catch(function(){
      errEl.textContent = 'Could not reach that URL \u2014 check it\'s correct and deployed';
      errEl.style.display = 'block';
    });
  });
}

var loginState = { workers: [], selectedWorker: null, pin: '' };

function showWorkerLoginScreen(){
  var screen = document.getElementById('login-screen');
  screen.style.display = 'flex';
  document.getElementById('main-content').style.display = 'none';
  screen.innerHTML = '<div class="login-card"><p class="sub">Loading workers...</p></div>';

  apiGet('getWorkers').then(function(data){
    if(data.error){
      screen.innerHTML = '<div class="login-card"><p style="color:var(--danger);font-size:13px">' + escapeHtml(data.error) + '</p>' +
        '<span class="setup-link" id="back-to-setup">Reconfigure server URL</span></div>';
      document.getElementById('back-to-setup').addEventListener('click', showServerSetupScreen);
      return;
    }
    loginState.workers = data.workers || [];
    renderWorkerPicker();
  }).catch(function(){
    screen.innerHTML = '<div class="login-card"><p style="color:var(--danger);font-size:13px">Could not reach the server.</p>' +
      '<span class="setup-link" id="back-to-setup">Reconfigure server URL</span></div>';
    document.getElementById('back-to-setup').addEventListener('click', showServerSetupScreen);
  });
}

function renderWorkerPicker(){
  var screen = document.getElementById('login-screen');
  screen.innerHTML =
    '<div class="login-card">' +
      '<h2>Who\'s working?</h2>' +
      '<p class="sub">Select your name to continue</p>' +
      '<div class="worker-grid" id="worker-grid"></div>' +
      '<span class="setup-link" id="back-to-setup">Reconfigure server</span>' +
    '</div>';

  var grid = document.getElementById('worker-grid');
  if(loginState.workers.length === 0){
    grid.innerHTML = '<p style="font-size:13px;color:var(--text-dim)">No workers set up yet. Add rows to the Workers tab in your Sheet.</p>';
  }
  loginState.workers.forEach(function(w){
    var pill = document.createElement('div');
    pill.className = 'worker-pill';
    pill.innerHTML = '<span>' + escapeHtml(w.name) + '</span><svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2"><path d="M9 18l6-6-6-6"/></svg>';
    pill.addEventListener('click', function(){
      loginState.selectedWorker = w;
      loginState.pin = '';
      renderPinPad();
    });
    grid.appendChild(pill);
  });

  document.getElementById('back-to-setup').addEventListener('click', showServerSetupScreen);
}

function renderPinPad(){
  var screen = document.getElementById('login-screen');
  screen.innerHTML =
    '<div class="login-card">' +
      '<h2>' + escapeHtml(loginState.selectedWorker.name) + '</h2>' +
      '<p class="sub">Enter your 4-digit PIN</p>' +
      '<div class="pin-dots" id="pin-dots"></div>' +
      '<div class="pin-pad" id="pin-pad"></div>' +
      '<p id="pin-error" style="color:var(--danger);font-size:12px;margin-top:12px;text-align:center;display:none"></p>' +
      '<span class="setup-link" id="back-to-workers">Not you? Choose a different name</span>' +
    '</div>';

  renderPinDots();

  var pad = document.getElementById('pin-pad');
  var keys = ['1','2','3','4','5','6','7','8','9','','0','del'];
  keys.forEach(function(k){
    var key = document.createElement('div');
    if(k === ''){ key.style.visibility = 'hidden'; pad.appendChild(key); return; }
    key.className = 'pin-key';
    key.textContent = k === 'del' ? '\u232b' : k;
    key.addEventListener('click', function(){
      if(k === 'del'){
        loginState.pin = loginState.pin.slice(0, -1);
        renderPinDots();
        return;
      }
      if(loginState.pin.length >= 4) return;
      loginState.pin += k;
      renderPinDots();
      if(loginState.pin.length === 4){
        attemptLogin();
      }
    });
    pad.appendChild(key);
  });

  document.getElementById('back-to-workers').addEventListener('click', renderWorkerPicker);
}

function renderPinDots(){
  var dots = document.getElementById('pin-dots');
  if(!dots) return;
  dots.innerHTML = '';
  for(var i = 0; i < 4; i++){
    var dot = document.createElement('div');
    dot.className = 'pin-dot' + (i < loginState.pin.length ? ' filled' : '');
    dots.appendChild(dot);
  }
}

function attemptLogin(){
  var errEl = document.getElementById('pin-error');
  tryLogin(loginState.selectedWorker.id, loginState.pin, function(worker){
    document.getElementById('login-screen').style.display = 'none';
    startApp();
  }, function(message){
    loginState.pin = '';
    renderPinDots();
    if(errEl){ errEl.textContent = message; errEl.style.display = 'block'; }
  });
}

function updateWorkerIndicator(){
  var el = document.getElementById('worker-indicator');
  var logoutBtn = document.getElementById('btn-logout');
  if(!currentWorker){ el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = '<span class="ps-dot" style="background:var(--text-dim)"></span>' + escapeHtml(currentWorker.name) + (currentWorker.role === 'admin' ? ' \u00b7 Admin' : '');
  logoutBtn.style.display = 'inline-flex';

  // Hide actions a worker (non-admin) shouldn't see
  document.getElementById('btn-add').style.display = 'inline-flex';
}

function logoutWorker(){
  clearWorkerSession();
  currentWorker = null;
  currentWorkerPin = null;
  document.getElementById('worker-indicator').style.display = 'none';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('main-content').style.display = 'none';
  showWorkerLoginScreen();
}

function startApp(){
  document.getElementById('main-content').style.display = 'block';
  updateWorkerIndicator();
  loadData(function(){
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    renderStats();
    renderTable();
  });
}

/* ================= INIT ================= */

function init(){
  populateFilters();
  document.getElementById('search-input').addEventListener('input', function(e){ state.search = e.target.value; renderTable(); });
  document.getElementById('cat-filter').addEventListener('change', function(e){ state.catFilter = e.target.value; renderTable(); });
  document.getElementById('cond-filter').addEventListener('change', function(e){ state.condFilter = e.target.value; renderTable(); });
  document.getElementById('btn-add').addEventListener('click', function(){ openForm(null); });
  document.getElementById('btn-scan').addEventListener('click', openScanStation);
  document.getElementById('btn-export').addEventListener('click', exportCSV);
  document.getElementById('btn-logout').addEventListener('click', logoutWorker);
  document.getElementById('btn-refresh').addEventListener('click', function(){
    document.getElementById('loading-screen').style.display = 'flex';
    document.getElementById('app-content').style.display = 'none';
    loadData(function(){
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('app-content').style.display = 'block';
      renderStats(); renderTable();
      showToast('Inventory refreshed', 'success');
    });
  });

  var apiUrl = getApiUrl();
  if(!apiUrl){
    showServerSetupScreen();
    return;
  }

  var session = getWorkerSession();
  if(session && session.worker && session.pin){
    currentWorker = session.worker;
    currentWorkerPin = session.pin;
    startApp();
  } else {
    showWorkerLoginScreen();
  }
}

init();

})();
