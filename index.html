function updateCartBadge(){
  var b=$('cartBadge'); if(!b) return;
  var n=S.cart.reduce(function(a,l){return a+l.qty;},0);
  b.style.display=n>0?'block':'none';
  b.textContent=n;
}
function addToCart(partid,qty){
  var p=S.data.parts.find(function(x){return String(x.id)===String(partid);});
  if(!p) return;
  qty=Math.max(1,Math.round(qty||1));
  var inCart=S.cart.filter(function(l){return l.partid===p.id;}).reduce(function(a,l){return a+l.qty;},0);
  var avail=Math.max(0,num(p.qty)||1);
  if(p.status==='sold'||inCart+qty>avail){ toast('Not enough stock — '+(avail-inCart)+' available',true); return; }
  var line=S.cart.find(function(l){return l.partid===p.id;});
  if(line) line.qty+=qty;
  else S.cart.push({partid:p.id,sku:p.sku,name:p.name,price:num(p.price)||0,qty:qty});
  updateCartBadge();
  toast('Added to cart — '+p.sku);
}
function cartQty(i,delta){
  var l=S.cart[i]; if(!l) return;
  var p=S.data.parts.find(function(x){return x.id===l.partid;});
  var avail=p?Math.max(0,num(p.qty)||1):999;
  l.qty+=delta;
  if(l.qty<=0) S.cart.splice(i,1);
  if(l.qty>avail){ l.qty=avail; toast('Only '+avail+' in stock',true); }
  updateCartBadge(); openCart();
}
function cartPrice(i,v){ if(S.cart[i]) S.cart[i].price=num(v); openCart(); }
function openCart(){
  var h='<div class="mhead"><h3>ORDER CART</h3><button onclick="closeModal()">&times;</button></div>';
  if(!S.cart.length){
    h+='<div class="empty">Cart is empty.<br><br>Add parts from a part\'s page, the scan station, or scan below.</div>';
  } else {
    var total=0;
    S.cart.forEach(function(l,i){
      total+=l.price*l.qty;
      h+='<div style="display:flex;align-items:center;gap:.6rem;padding:.55rem 0;border-bottom:1px solid var(--line)">'+
        '<div style="flex:1;min-width:0"><b style="font-size:.85rem">'+esc(l.sku)+'</b><br><small style="color:var(--ink-dim)">'+esc(l.name)+'</small></div>'+
        '<div style="display:flex;align-items:center;gap:.3rem">'+
          '<button class="btn ghost small" style="padding:.3rem .6rem" onclick="cartQty('+i+',-1)">&minus;</button>'+
          '<b style="min-width:1.4rem;text-align:center">'+l.qty+'</b>'+
          '<button class="btn ghost small" style="padding:.3rem .6rem" onclick="cartQty('+i+',1)">+</button></div>'+
        '<input type="number" inputmode="decimal" step="0.01" value="'+l.price+'" onchange="cartPrice('+i+',this.value)" style="width:5.2rem;text-align:right;padding:.4rem"></div>';
    });
    h+='<div class="kv" style="border-bottom:0;font-size:1rem"><span>Total</span><b style="font-family:var(--disp);font-size:1.4rem">'+money(total)+'</b></div>';
  }
  h+='<div class="field" style="margin-top:.6rem"><label>Scan / add by SKU</label><div style="position:relative">'+
     '<input id="cartSku" placeholder="Scan barcode or type SKU" autocomplete="off" onkeydown="if(event.key===\'Enter\'){cartSkuAdd(this.value);this.value=\'\';}" style="padding-right:3rem">'+
     '<button type="button" onclick="cameraScanToField(\'cartSkuGhost\')" aria-label="Scan with camera" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:var(--panel);border:1px solid var(--line2);border-radius:7px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-dim)"><svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg></button></div>'+
     '<input type="hidden" id="cartSkuGhost" onchange="cartSkuAdd(this.value)"></div>';
  if(S.cart.length) h+='<div class="mact"><button class="btn green full" onclick="openCheckout()">Checkout ('+S.cart.reduce(function(a,l){return a+l.qty;},0)+' items)</button>'+
     '<button class="btn ghost full" onclick="if(confirm(\'Empty the cart?\')){S.cart=[];updateCartBadge();openCart();}">Empty Cart</button></div>';

function cartSkuAdd(sku){
  sku=String(sku||'').trim().toUpperCase();

  var p=S.data.parts.find(function(x){return String(x.sku).toUpperCase()===sku;});
  if(!p){ toast(sku+' not found',true); return; }
  logScan(p,'scan');
  addToCart(p.id,1);
  openCart();
}

  var info=$('coTaxInfo'); if(!info) return;

function saveOrder(){
  var total=S.cart.reduce(function(a,l){return a+l.price*l.qty;},0);
  if(total<=0){ toast('Set prices on the lines first',true); return; }
  var custId=$('coCust').value, custName='';
  if(custId){ var c=S.data.customers.find(function(x){return x.id===custId;}); custName=c?c.name:''; }
  var split=segVal('segCoSplit'), paid1=0,method1='',balance=0,method='';
  if(split==='yes'){
    paid1=num($('coPaid1').value); method1=$('coMethod1').value;
    if(paid1<=0||paid1>total){ toast('Check the first payment amount',true); return; }
    balance=total-paid1;
  } else method=$('coMethod').value;
  var saleId=uid();
  var itemCount=S.cart.reduce(function(a,l){return a+l.qty;},0);
  var descr='Order — '+itemCount+' items: '+S.cart.map(function(l){return l.sku+(l.qty>1?' ×'+l.qty:'');}).join(', ').slice(0,180);
  addRow('Sales',{id:saleId,date:$('coDate').value||today(),invoice:$('coInvoice').value.trim(),customerid:custId,
    customername:custName,description:descr,saletype:'parts',amount:total,split:split,method:method,
    paid1:paid1,method1:method1,paid2:0,method2:'',balance:balance,invoiced:'no',partid:'',
    addedby:S.worker.name,notes:'',channel:$('coEbay').value.trim(),returned:'',returnreason:'',refundtype:'',
    refundamount:0,returndate:'',swappart:'',truckid:'',business:S.biz||''});
  S.cart.forEach(function(l){
    addRow('SaleItems',{id:uid(),saleid:saleId,partid:l.partid,sku:l.sku,name:l.name,qty:l.qty,price:l.price,total:l.price*l.qty},true);
    var p=S.data.parts.find(function(x){return x.id===l.partid;});
    if(p) sellOnePart(p,l.qty);
  });
  S.cart=[]; updateCartBadge();
  closeModal(); S.view='sales'; render();
  toast('Order saved — '+money(total));
}

  h+='<div class="row2"><div class="field"><label>Date</label><input id="esDate" type="date" value="'+esc(sl.date)+'"></div>'+
     '<div class="field"><label>Invoice #</label><input id="esInvoice" value="'+esc(sl.invoice)+'"></div></div>';
  h+='<div class="field"><label>Description</label><input id="esDesc" value="'+esc(sl.description)+'"></div>';
  h+='<div class="row2"><div class="field"><label>Sale type</label><select id="esType"><option value="parts"'+(sl.saletype!=='retail'?' selected':'')+'>Parts</option><option value="retail"'+(sl.saletype==='retail'?' selected':'')+'>Retail</option></select></div>'+
     '<div class="field"><label>Total amount ($)</label><input id="esAmount" type="number" inputmode="decimal" step="0.01" value="'+esc(sl.amount)+'"></div></div>';
  if(sl.split!=='yes') h+='<div class="field"><label>Payment method</label><select id="esMethod">'+PAY_METHODS.map(function(m){return '<option'+(m===sl.method?' selected':'')+'>'+m+'</option>';}).join('')+'</select></div>';
  else h+='<p class="note">Split sale: changing the total recalculates the remaining balance from the payments already recorded ('+money(num(sl.paid1)+num(sl.paid2))+' so far).</p>';
  h+='<div class="mact"><button class="btn full" onclick="saveEditSale(\''+sl.id+'\')">Save Changes</button></div>';
  openModal(h);
}
function saveEditSale(id){
  var sl=S.data.sales.find(function(x){return String(x.id)===String(id);});
  var amount=num($('esAmount').value);
  if(amount<=0){ toast('Enter the amount',true); return; }
  var f={date:$('esDate').value,invoice:$('esInvoice').value.trim(),description:$('esDesc').value.trim(),
    saletype:$('esType').value,amount:amount};
  if(sl.split==='yes'){ f.balance=Math.max(0,amount-num(sl.paid1)-num(sl.paid2)); }
  else { f.method=$('esMethod').value; }
  updateRow('Sales',id,f);
  toast('Sale updated'); openSale(id); render();
}

/* ============================================================
   CODE 128 BARCODE (built-in, no internet needed)
   ============================================================ */


var C128=['212222','222122','222221','121223','121322','131222','122213','122312','132212','221213','221312','231212','112232','122132','122231','113222','123122','123221','223211','221132','221231','213212','223112','312131','311222','321122','321221','312212','322112','322211','212123','212321','232121','111323','131123','131321','112313','132113','132311','211313','231113','231311','112133','112331','132131','113123','113321','133121','313121','211331','231131','213113','213311','213131','311123','311321','331121','312113','312311','332111','314111','221411','431111','111224','111422','121124','121421','141122','141221','112214','112412','122114','122411','142112','142211','241211','221114','413111','241112','134111','111242','121142','121241','114212','124112','124211','411212','421112','421211','212141','214121','412121','111143','111341','131141','114113','114311','411113','411311','113141','114131','311141','411131','211412','211214','211232','2331112'];
function code128svg(text,mod,height){
  mod=mod||2; height=height||60;
  var codes=[104], sum=104;
  for(var i=0;i<text.length;i++){
    var v=text.charCodeAt(i)-32;
    if(v<0||v>94) v=0;
    codes.push(v); sum+=v*(i+1);
  }
  codes.push(sum%103); codes.push(106);
  var x=0, bars='';
  codes.forEach(function(c){
    var pat=C128[c];
    for(var j=0;j<pat.length;j++){
      var w=+pat[j]*mod;
      if(j%2===0) bars+='<rect x="'+x+'" y="0" width="'+w+'" height="'+height+'" fill="#000"/>';
      x+=w;
    }
  });
  var quiet=10*mod;
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+(x+quiet*2)+' '+height+'" width="'+Math.min(320,x+quiet*2)+'" height="'+height+'"><g transform="translate('+quiet+',0)">'+bars+'</g></svg>';
}
function code128canvas(text,widthPx,heightPx,label){
  // renders barcode + text onto a canvas (for Brady printing)
  var codes=[104],sum=104;
  for(var i=0;i<text.length;i++){ var v=text.charCodeAt(i)-32; if(v<0||v>94)v=0; codes.push(v); sum+=v*(i+1); }
  codes.push(sum%103); codes.push(106);
  var units=0;
  codes.forEach(function(c){ var p=C128[c]; for(var j=0;j<p.length;j++) units+=+p[j]; });
  var cv=document.createElement('canvas'); cv.width=widthPx; cv.height=heightPx;
  var ctx=cv.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,widthPx,heightPx);
  var quiet=Math.round(widthPx*0.05);
  var mod=(widthPx-quiet*2)/units;
  var barH=label?Math.round(heightPx*0.62):heightPx-8;
  var x=quiet;
  ctx.fillStyle='#000';
  codes.forEach(function(c){
    var p=C128[c];
    for(var j=0;j<p.length;j++){
      var w=+p[j]*mod;
      if(j%2===0) ctx.fillRect(Math.round(x),4,Math.max(1,Math.round(w)),barH);
      x+=w;
    }
  });
  if(label){
    ctx.font='bold '+Math.round(heightPx*0.2)+'px Arial';
    ctx.textAlign='center';
    ctx.fillText(text,widthPx/2,heightPx-Math.round(heightPx*0.06));
  }
  return cv;
}
function printLabelPage(partId){
  var p=S.data.parts.find(function(x){return String(x.id)===String(partId);});
  if(!p) return;
  var w=window.open('','_blank','width=420,height=320');
  if(!w){ toast('Popup blocked — allow popups to print',true); return; }
  w.document.write('<html><head><title>'+esc(p.sku)+'</title><style>body{margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:Arial}@media print{@page{margin:2mm}}</style></head><body>'+
    code128svg(p.sku,2,70)+'<div style="font-weight:bold;letter-spacing:2px;margin-top:4px">'+esc(p.sku)+'</div>'+
    '<div style="font-size:11px;margin-top:2px">'+esc(p.name)+'</div>'+
    '<script>window.onload=function(){window.print();}<\/script></body></html>');
  w.document.close();
}

/* ---------- Brady M211 (Web SDK over Bluetooth) ---------- */
var bradySdk=null;
function bradyPrint(partId){
  var p=S.data.parts.find(function(x){return String(x.id)===String(partId);});
  if(!p) return;
  if(typeof BradySdk==='undefined'){
    // load SDK on demand
    toast('Loading Brady SDK...');
    var sc=document.createElement('script');
    sc.src='https://sdk.bradyid.com/BradySdk/bundle.js';
    sc.onload=function(){ bradyGo(p); };
    sc.onerror=function(){ toast('Could not load Brady SDK — use Any Printer instead',true); };
    document.head.appendChild(sc);
  } else bradyGo(p);
}
function bradyGo(p){
  try{
    if(!bradySdk) bradySdk=new BradySdk(function(){},false);
    var doPrint=function(){
      // 0.75in x 0.5in @ 300dpi
      var cv=code128canvas(p.sku,225,150,true);
      var img=new Image();
      img.onload=function(){
        Promise.resolve(bradySdk.printBitmap(img)).then(function(ok){
          toast(ok===false?'Print failed — check printer':'Sent to Brady printer');
        }).catch(function(){ toast('Print failed',true); });
      };
      img.src=cv.toDataURL('image/png');
    };
    if(bradySdk.isConnected){ doPrint(); }
    else{
      toast('Pick your M211 in the Bluetooth window');
      Promise.resolve(bradySdk.showDiscoveredBleDevices(function(){ doPrint(); }))
        .catch(function(){ toast('Bluetooth connection failed — use Any Printer option',true); });
    }
  }catch(err){ toast('Brady error: '+err.message+' — use Any Printer option',true); }
}

function clearScanHistory(){
  if(!confirm('Delete the entire scan history? This cannot be undone.')) return;
  S.data.scanlog=[];
  api({action:'clearsheet',sheet:'ScanLog'}).then(function(res){
    if(res&&res.ok) toast('Scan history cleared'); else toast('Could not clear on the server',true);
  });
  render();
}
function rScan(){
  var recent=S.data.scanlog.slice().sort(function(a,b){return String(b.date).localeCompare(String(a.date));}).slice(0,25);
  var h='<div class="vhead"><h2>SCAN STATION</h2>'+(isAdmin()&&S.data.scanlog.length?'<div class="spacer"></div><button class="btn ghost small" onclick="clearScanHistory()">Clear History</button>':'')+'</div>';
  h+='<div class="bigscan"><input id="scanInput" data-autofocus placeholder="SCAN BARCODE" autocomplete="off" onkeydown="if(event.key===\'Enter\')doScan(this.value)">'+
     '<div style="margin-top:.7rem"><button class="btn full" onclick="cameraScan()">'+IC.scan+' Scan with Camera</button></div>'+
     '<p>Bluetooth scanner: tap the box and pull the trigger. No scanner? Use the camera button — point the phone at the label.</p></div>';
  h+='<div id="scanResult"></div>';
  h+='<div class="panel"><h3>SCAN <em>HISTORY</em></h3><div class="list">';
  if(!recent.length) h+='<div class="empty">No scans yet</div>';
  recent.forEach(function(l){
    h+='<div class="item"><div class="ic">'+IC.scan+'</div><div class="mid"><b>'+esc(l.sku)+'</b><small>'+esc(l.action)+' by '+esc(l.worker)+'</small></div>'+
      '<div class="amt"><small>'+esc(l.date)+'</small></div></div>';
  });
  h+='</div></div>';
  return h;
}
function doScan(sku){
  sku=String(sku||'').trim().toUpperCase();
  if(!sku) return;
  $('scanInput').value='';
  var p=S.data.parts.find(function(x){return String(x.sku).toUpperCase()===sku;});
  if(!p){
    $('scanResult').innerHTML='<div class="panel" style="border-color:var(--red)"><b>'+esc(sku)+'</b> — not found in inventory.</div>';
    return;
  }
  logScan(p,'scan');
  var h='<div class="panel" style="border-color:var(--green)">'+
    '<h3>'+esc(p.sku)+' <em>FOUND</em></h3>'+
    '<div class="kv"><span>Part</span><b>'+esc(p.name)+'</b></div>'+
    '<div class="kv"><span>Price</span><b>'+(num(p.price)?money(p.price):'—')+'</b></div>'+
    '<div class="kv"><span>Status</span><b>'+(p.status==='sold'?'SOLD':'In stock'+(num(p.qty)>1?' — '+num(p.qty)+' available':''))+'</b></div>'+
    '<div class="mact">'+
    (p.status!=='sold'?'<button class="btn green full" onclick="openAddSale({sku:\''+esc(p.sku)+'\',desc:\''+esc(p.name).replace(/'/g,"\\'")+'\',amount:'+(num(p.price)||'\'\'')+'})">Sell This Part</button><button class="btn ghost full" onclick="addToCart(\''+p.id+'\',1)">Add to Cart</button>':'')+
    '<button class="btn ghost full" onclick="openPart(\''+p.id+'\')">View / Print Label</button></div></div>';
  $('scanResult').innerHTML=h;
}
var _zxingReader=null;
function stopCamera(){
  try{ if(_zxingReader){ _zxingReader.reset(); _zxingReader=null; } }catch(e){}
}
function closeCamOverlay(){
  stopCamera();
  var el=$('camWrap'); if(el) el.parentNode.removeChild(el);
}
function cameraScan(cb){
  cb = cb || function(code){
    if(S.view!=='scan'){ S.view='scan'; render(); }
    setTimeout(function(){ doScan(code); },50);
  };
  var start=function(){
    closeCamOverlay();
    var wrap=document.createElement('div');
    wrap.id='camWrap';
    wrap.style.cssText='position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem';
    wrap.innerHTML='<div style="position:relative;width:100%;max-width:520px;border-radius:14px;overflow:hidden;background:#000">'+
      '<video id="camVideo" playsinline muted style="width:100%;display:block;max-height:65vh;object-fit:cover"></video>'+
      '<div style="position:absolute;left:8%;right:8%;top:42%;height:16%;border:2px solid #D62B2B;border-radius:8px"></div></div>'+
      '<p style="color:#ccc;font-size:.8rem;margin:.9rem 0;text-align:center">Line the barcode up in the red box — it reads automatically.</p>'+
      '<button id="camClose" style="background:#26282C;border:1px solid #444;color:#fff;font-family:var(--ui);letter-spacing:.08em;text-transform:uppercase;font-size:.8rem;padding:.7rem 2rem;border-radius:9px;cursor:pointer">Cancel</button>';
    document.body.appendChild(wrap);
    $('camClose').onclick=closeCamOverlay;
    try{
      _zxingReader=new ZXing.BrowserMultiFormatReader();
      _zxingReader.decodeFromVideoDevice(null,'camVideo',function(result,err){
        if(result){
          var code=result.getText();
          closeCamOverlay();
          cb(code);
        }
      });
    }catch(err){
      toast('Camera not available: '+err.message,true); closeCamOverlay();
    }
  };
  if(typeof ZXing!=='undefined'){ start(); return; }
  toast('Loading camera scanner...');
  var sc=document.createElement('script');
  sc.src='https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js';
  sc.onload=start;
  sc.onerror=function(){ toast('Could not load the scanner — check internet',true); };
  document.head.appendChild(sc);
}
function cameraScanToField(id){
  cameraScan(function(code){
    var el=$(id); if(!el) return;
    el.value=code;
    if(id==='fSku') skuLookup(code);
    if(id==='ppPart') ppPartLookup(code);
    if(id==='rtSwap') rtSwapLookup(code);
  });
}
function rScanLog(){
  var recent=S.data.scanlog.slice().sort(function(a,b){return String(b.date).localeCompare(String(a.date));}).slice(0,100);
  var h='<div class="vhead"><h2>SCAN HISTORY</h2>'+(isAdmin()&&S.data.scanlog.length?'<div class="spacer"></div><button class="btn ghost small" onclick="clearScanHistory()">Clear History</button>':'')+'</div><div class="list">';
  if(!recent.length) h+='<div class="empty">No scans yet</div>';
  recent.forEach(function(l){
    h+='<div class="item"><div class="ic">'+IC.scan+'</div><div class="mid"><b>'+esc(l.sku)+'</b><small>'+esc(l.action)+' by '+esc(l.worker)+'</small></div>'+
      '<div class="amt"><small>'+esc(l.date)+'</small></div></div>';
  });
  return h+'</div>';
}
