    } else if(e.paytype==='hourly'){
      h+='<div class="field" style="margin-bottom:0"><label>Hours worked (blank = off; past 8 = OT)</label><input id="ld_'+e.id+'_h" type="number" inputmode="decimal" step="0.5" value="'+(ex&&num(ex.hours)?num(ex.hours):'')+'"></div>';
    } else {

        '<label style="display:flex;align-items:center;gap:.35rem;font-size:.8rem;cursor:pointer;margin:0">Stayed late<input id="ld_'+e.id+'_l" type="checkbox" style="width:auto"'+(ex&&num(ex.late)?' checked':'')+'></label></div>';
    }

  });

      var btn=$('ld_'+e.id+'_d');

    }
  });
}
function saveLogDay(d){
  d=$('ldDate')?$('ldDate').value:d;   // always trust what's on screen
  var emps=activeEmployees(), saved=0;
  var dt=new Date(d+'T12:00:00');
  var isWeekend=dt.getDay()===6||dt.getDay()===0;
  emps.forEach(function(e){
    var hours=0,dayval=0,late=0,satpay=0,any=false;
    if(isWeekend){ satpay=num(($('ld_'+e.id+'_s')||{}).value); any=satpay>0; }
    else if(e.paytype==='hourly'){ hours=num(($('ld_'+e.id+'_h')||{}).value); any=hours>0; }
    else{
      var btn=$('ld_'+e.id+'_d'); dayval=btn?num(btn.dataset.v):0;
      late=($('ld_'+e.id+'_l')||{}).checked?1:0;
      any=dayval>0||late>0;
    }
    var ex=S.data.payrolldays.find(function(l){return l.workerid===e.id && String(l.date)===d && l.consumed!=='yes';});
    if(ex && !any){
      S.data.payrolldays=S.data.payrolldays.filter(function(l){return l.id!==ex.id;});
      api({action:'delete',sheet:'PayrollDays',id:ex.id});
      saved++;
    } else if(ex){
      updateRow('PayrollDays',ex.id,{hours:hours,dayval:dayval,late:late,satpay:satpay});
      saved++;
    } else if(any){
      addRow('PayrollDays',{id:uid(),date:d,workerid:e.id,workername:e.name,paytype:e.paytype,
        hours:hours,dayval:dayval,late:late,satpay:satpay,notes:'',consumed:''},true);
      saved++;
    }
  });
  closeModal(); render();
  toast(saved?'Day saved — '+saved+' worker'+(saved>1?'s':''):'Nothing to save');
}
function weekLogsFor(week){
  var end=new Date(week+'T12:00:00'); end.setDate(end.getDate()+6);
  var endIso=end.getFullYear()+'-'+String(end.getMonth()+1).padStart(2,'0')+'-'+String(end.getDate()).padStart(2,'0');
  return S.data.payrolldays.filter(function(l){return String(l.date)>=week && String(l.date)<=endIso;});
}
function prefillRun(week){
  var logs=weekLogsFor(week);
  var banner=$('prBanner');
  if(banner){
    var end=new Date(week+'T12:00:00'); end.setDate(end.getDate()+6);
    var endIso=end.getFullYear()+'-'+String(end.getMonth()+1).padStart(2,'0')+'-'+String(end.getDate()).padStart(2,'0');
    var pendingHere=logs.filter(function(l){return l.consumed!=='yes';}).length;
    var already=S.data.payrollruns.find(function(r){return r.weekstart===week;});
    var html='<b>Running: Mon '+fmtDate(week)+' &rarr; Sun '+fmtDate(endIso)+'.</b><br>';
    if(already) html+='<b style="color:var(--tag-red)">WARNING: this week was already run ('+money(already.total)+' on '+fmtDate(already.date)+'). Saving again creates a SECOND payroll for the same week.</b><br>';
    if(pendingHere) html+=pendingHere+' logged day'+(pendingHere>1?'s':'')+' prefilled below — saving consolidates and clears them.';
    else html+='No daily logs for this week — fill it in manually.';
    html+=' Days logged in other weeks are not touched.';
    banner.innerHTML=html;
    banner.style.background=already?'var(--panel2)':'var(--panel2)';
    banner.style.borderLeft='4px solid '+(already?'var(--red)':'var(--blue)');
  }
  var dayKeys=['mon','tue','wed','thu','fri'];
  activeEmployees().forEach(function(e){
    dayKeys.forEach(function(k){ var el=$('pw_'+e.id+'_'+k); if(!el) return; if(e.paytype==='hourly') el.value=''; else setDayBtn(el,'0'); var lc=$('pw_'+e.id+'_late_'+k); if(lc) lc.checked=false; });
    var sEl=$('pw_'+e.id+'_sat'); if(sEl) sEl.value='';
    var satSum=0;
    logs.forEach(function(l){
      if(l.workerid!==e.id) return;
      var dt=new Date(String(l.date)+'T12:00:00'), dow=dt.getDay();
      if(dow===6||dow===0){ satSum+=num(l.satpay); return; }
      var k=dayKeys[dow-1]; if(!k) return;
      var el=$('pw_'+e.id+'_'+k); if(!el) return;
      if(e.paytype==='hourly') el.value=num(l.hours)||'';
      else setDayBtn(el,num(l.dayval));
      var lc=$('pw_'+e.id+'_late_'+k); if(lc) lc.checked=!!num(l.late);
    });
    if(sEl&&satSum) sEl.value=satSum;
  });
  payrollCalc();
}
function weekDatesOf(mon){
  var out=[];
  for(var i=0;i<7;i++){
    var dt=new Date(mon+'T12:00:00'); dt.setDate(dt.getDate()+i);
    out.push(dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'));
  }
  return out;
}

      }
      h+='</td>';
    });

  });
  h+='<tr><td colspan="'+(dates.length+1)+'"><b>WEEK TOTAL (est., late $ set at Run Week)</b></td><td class="r"><b id="wlestTotal" style="color:var(--red)">$0</b></td></tr>';
  h+='</table></div>';
  if(isAdmin()) h+='<div class="mact"><button class="btn full" onclick="saveWeekLog()">Save Week Days</button>'+
     '<button class="btn ghost full" onclick="S.view=\'payroll\';render()">Back to Payroll</button></div>';
  setTimeout(wlCalc,30);
  return h;
}
function wlCycle(btn){
  var v=btn.dataset.v==='0'?'1':btn.dataset.v==='1'?'0.5':'0';
  btn.dataset.v=v;
  btn.querySelector('b').textContent=v==='1'?'Full':v==='0.5'?'½':'—';
  btn.style.background=v==='1'?'var(--red)':v==='0.5'?'var(--panel2)':'var(--panel)';
  btn.style.color=v==='1'?'#fff':v==='0.5'?'var(--ink)':'var(--ink-dim)';
  btn.style.borderColor=v==='0'?'var(--line)':'var(--red)';

}
function wlLate(btn){
  var on=btn.dataset.on==='1'?'0':'1';
  btn.dataset.on=on;
  btn.style.background=on==='1'?'var(--amber)':'var(--panel)';

function wlCalc(){
  var week=S.weekLogWeek||lastMonday();
  var dates=weekDatesOf(week);
  var total=0;
  activeEmployees().forEach(function(e){
    var est=0;
    dates.forEach(function(dte,i){
      var el=$('wl_'+e.id+'_'+dte); if(!el) return;
      if(i>=5){ est+=num(el.value); return; }
      if(e.paytype==='hourly'){
        var hrs=num(el.value), reg=Math.min(8,hrs), ot=Math.max(0,hrs-8);
        est+=reg*num(e.rate)+ot*num(e.rate)*(num(e.otmult)||1.5);
      } else est+=num(el.dataset.v)*num(e.rate);
    });
    var sp=$('wlest_'+e.id); if(sp) sp.textContent=money(est);
    total+=est;
  });
  var t=$('wlestTotal'); if(t) t.textContent=money(total);
}
function saveWeekLog(){
  var week=S.weekLogWeek||lastMonday();
  var dates=weekDatesOf(week);
  var changed=0;
  activeEmployees().forEach(function(e){
    dates.forEach(function(dte,i){
      var el=$('wl_'+e.id+'_'+dte); if(!el||el.disabled) return;
      var hours=0,dayval=0,late=0,satpay=0;
      if(i>=5) satpay=num(el.value);
      else if(e.paytype==='hourly') hours=num(el.value);
      else{
        dayval=num(el.dataset.v);
        var lb=$('wll_'+e.id+'_'+dte);
        late=lb&&lb.dataset.on==='1'?1:0;
      }
      var any=hours>0||dayval>0||late>0||satpay>0;
      var ex=S.data.payrolldays.find(function(l){return l.workerid===e.id && String(l.date)===dte && l.consumed!=='yes';});
      if(ex && !any){
        S.data.payrolldays=S.data.payrolldays.filter(function(l){return l.id!==ex.id;});
        api({action:'delete',sheet:'PayrollDays',id:ex.id});
        changed++;
      } else if(ex){
        if(num(ex.hours)!==hours||num(ex.dayval)!==dayval||num(ex.late)!==late||num(ex.satpay)!==satpay){
          updateRow('PayrollDays',ex.id,{hours:hours,dayval:dayval,late:late,satpay:satpay});
          changed++;
        }
      } else if(any){
        addRow('PayrollDays',{id:uid(),date:dte,workerid:e.id,workername:e.name,paytype:e.paytype,
          hours:hours,dayval:dayval,late:late,satpay:satpay,notes:'',consumed:''},true);
        changed++;
      }
    });
  });
  toast(changed?('Week saved — '+changed+' day'+(changed>1?'s':'')+' written'):'No changes');
  render();
}
function mondayOf(dateStr){
  var dt=new Date(String(dateStr)+'T12:00:00');
  dt.setDate(dt.getDate()-((dt.getDay()+6)%7));
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}

function savePayrollRun(){
  if(!submitOnce()) return;
  var week=$('prWeek').value||lastMonday();
  if(S.data.payrollruns.some(function(r){return r.weekstart===week;})){
    if(!confirm('A payroll for this week already exists. Save another one anyway?')) return;
  }
  var emps=activeEmployees(), lines=[], grand=0;
  var prBiz=$('prBiz')?$('prBiz').value:(S.biz||'');
  emps.forEach(function(e){
    var l=lineCalc(e);
    if(!l.included || l.total<=0) return;
    l.id=uid(); l.workerid=e.id; l.workername=e.name; l.paytype=e.paytype; l.rate=num(e.rate); l.otmult=num(e.otmult)||1.5;
    lines.push(l); grand+=l.total;
  });
  if(!lines.length){ toast('Nothing to pay — fill in days or hours',true); return; }
  var runid=uid();
  var byMethod={};
  lines.forEach(function(l){ byMethod[l.method]=byMethod[l.method]||[]; byMethod[l.method].push(l); });
  var methods=Object.keys(byMethod), expids=[];
  methods.forEach(function(m){
    var sub=byMethod[m].reduce(function(a,l){return a+l.total;},0);
    var expid=uid(); expids.push(expid);
    addRow('Expenses',{id:expid,date:today(),
      description:'Payroll — week of '+fmtDate(week)+(methods.length>1?' ('+m+')':''),category:'Payroll',
      method:m,amount:sub,truck:'',truckpurpose:'',providerid:'',deliverycost:0,addedby:S.worker.name,
      notes:byMethod[m].length+' worker'+(byMethod[m].length>1?'s':''),customerid:'',business:prBiz},true);
    byMethod[m].forEach(function(l){ l.expid=expid; });
  });
  addRow('PayrollRuns',{id:runid,weekstart:week,date:today(),total:grand,expenseid:expids.join(','),method:methods.join(', '),notes:'',addedby:S.worker.name,business:prBiz},true);
  lines.forEach(function(l){
    addRow('PayrollLines',{id:l.id,runid:runid,workerid:l.workerid,workername:l.workername,paytype:l.paytype,rate:l.rate,
      otmult:l.otmult,mon:l.mon,tue:l.tue,wed:l.wed,thu:l.thu,fri:l.fri,othours:l.othours,latepay:l.latepay,satpay:l.satpay,total:l.total,
      method:l.method,lateamt:l.lateamt,latedays:l.latedays},true);
  });
  weekLogsFor(week).forEach(function(l){ if(l.consumed!=='yes') updateRow('PayrollDays',l.id,{consumed:'yes'}); });
  closeModal(); render(); toast('Payroll saved — '+money(grand)+' logged as expense');
}
function payrollLinesTable(runid,methodFilter){
  var lines=S.data.payrolllines.filter(function(l){return l.runid===runid && (!methodFilter||l.method===methodFilter);});
  if(!lines.length) return '<div class="empty" style="padding:.8rem">No lines</div>';
  var h='<table class="rep"><tr><th>Worker</th><th>Days / Hrs</th><th class="r">Extras</th><th class="r">Total</th></tr>', sum=0;
  lines.forEach(function(l){
    sum+=num(l.total);
    var detail;
    if(l.paytype==='hourly'){
      var hrs=num(l.mon)+num(l.tue)+num(l.wed)+num(l.thu)+num(l.fri);
      detail=hrs+'h'+(num(l.othours)>0?' ('+num(l.othours)+'h OT &times;'+l.otmult+')':'');
    } else {
      var days=num(l.mon)+num(l.tue)+num(l.wed)+num(l.thu)+num(l.fri);
      detail=(days%1===0?days:days.toFixed(1))+' day'+(days===1?'':'s');
    }
    var extras=[];
    if(num(l.latepay)>0) extras.push('late'+(l.latedays?' '+esc(l.latedays):'')+' '+money(l.latepay));
    if(num(l.satpay)>0) extras.push('Sat '+money(l.satpay));
    h+='<tr><td><b>'+esc(l.workername)+'</b><br><small style="color:var(--ink-dim)">'+esc(l.method||'')+'</small></td><td>'+detail+'</td><td class="r">'+(extras.join(', ')||'—')+'</td><td class="r"><b>'+money(l.total)+'</b></td></tr>';
  });
  h+='<tr><td colspan="3"><b>GRAND TOTAL</b></td><td class="r"><b>'+money(sum)+'</b></td></tr></table>';
  return h;
}

function delPayrollRun(id){
  var r=S.data.payrollruns.find(function(x){return String(x.id)===String(id);});
  if(!r || !confirm('Delete this payroll week, its breakdown, and the linked expense?')) return;
  S.data.payrolllines.filter(function(l){return l.runid===id;}).forEach(function(l){ api({action:'delete',sheet:'PayrollLines',id:l.id}); });
  S.data.payrolllines=S.data.payrolllines.filter(function(l){return l.runid!==id;});
  String(r.expenseid||'').split(',').forEach(function(eid){
    if(!eid) return;
    S.data.expenses=S.data.expenses.filter(function(e){return e.id!==eid;});
    api({action:'delete',sheet:'Expenses',id:eid});
  });
  S.data.payrollruns=S.data.payrollruns.filter(function(x){return x.id!==id;});
  api({action:'delete',sheet:'PayrollRuns',id:id});
  closeModal(); render(); toast('Payroll week deleted');
}

function updateCartBadge(){
  try{ localStorage.setItem('tptg_cart',JSON.stringify(S.cart)); }catch(e){}
  var b=$('cartBadge'); if(!b) return;
  var n=S.cart.reduce(function(a,l){return a+l.qty;},0);
  b.style.display=n>0?'block':'none';
  b.textContent=n;
}
function addToCart(partid,qty){
  var p=S.data.parts.find(function(x){return String(x.id)===String(partid);});
  if(!p) return;
  qty=Math.max(1,Math.round(qty||1));
  var inCart=S.cart.filter(function(l){return l.partid===p.id;}).reduce(function(a,l){return a+l.qty;},0);
  var avail=Math.max(0,num(p.qty)||1);
  if(p.status==='sold'||inCart+qty>avail){ toast('Not enough stock — '+(avail-inCart)+' available',true); return; }
  var line=S.cart.find(function(l){return l.partid===p.id;});
  if(line) line.qty+=qty;
  else S.cart.push({partid:p.id,sku:p.sku,name:p.name,price:num(p.price)||0,qty:qty});
  updateCartBadge();
  toast('Added to cart — '+p.sku);
}
function cartQty(i,delta){
  var l=S.cart[i]; if(!l) return;
  var p=S.data.parts.find(function(x){return x.id===l.partid;});
  var avail=p?Math.max(0,num(p.qty)||1):999;
  l.qty+=delta;
  if(l.qty<=0) S.cart.splice(i,1);
  if(l.qty>avail){ l.qty=avail; toast('Only '+avail+' in stock',true); }
  updateCartBadge(); openCart();
}

    addedby:S.worker.name,notes:'',channel:$('coEbay').value.trim(),returned:'',returnreason:'',refundtype:'',

/* ============================================================
   YARD LOCATIONS (Yard > Section > Aisle > Bay > Shelf)
   ============================================================ */
function locPath(l){ return [l.yard,l.section,l.aisle,l.bay,l.shelf].filter(function(x){return String(x||'').trim();}).join(' › '); }
function locByCode(code){
  code=String(code||'').trim().toUpperCase();
  return S.data.locations.find(function(l){return String(l.code).toUpperCase()===code;});
}
function locOf(p){ return p.location?locByCode(p.location):null; }
function nextLocCode(){
  var max=0;
  S.data.locations.forEach(function(l){ var m=String(l.code).match(/^LOC-(\d+)$/); if(m) max=Math.max(max,parseInt(m[1],10)); });
  return 'LOC-'+String(max+1).padStart(4,'0');
}
function locFieldList(field){
  var seen={},out=[];
  S.data.locations.forEach(function(l){ var v=String(l[field]||'').trim(); if(v&&!seen[v.toLowerCase()]){seen[v.toLowerCase()]=1;out.push(v);} });
  return out;
}
var LOC_FIELDS=['yard','section','aisle','bay','shelf'];
function locSel(){ return S.locSel||(S.locSel={yard:'',section:'',aisle:'',bay:''}); }
function locMatchesSel(l,uptoDepth){
  var sel=locSel();
  for(var i=0;i<uptoDepth;i++){ if(String(l[LOC_FIELDS[i]]||'')!==sel[LOC_FIELDS[i]]) return false; }
  return true;
}
function locDepth(){
  var sel=locSel(), d=0;
  while(d<4 && sel[LOC_FIELDS[d]]) d++;
  return d;
}
function locGo(depth,value){
  var sel=locSel();
  if(value!==undefined) sel[LOC_FIELDS[depth]]=value;
  for(var i=(value!==undefined?depth+1:depth);i<4;i++) sel[LOC_FIELDS[i]]='';
  render();
}
function rLocations(){
  var q=(S.qLoc||'').toLowerCase();
  var h='<div class="vhead"><h2>LOCATIONS</h2></div>';
  h+='<div class="searchbar">'+IC.search+'<input placeholder="Search any yard, aisle, shelf, code" value="'+esc(S.qLoc||'')+'" oninput="S.qLoc=this.value;renderKeepFocus(this)"></div>';
  if(q){
    var flat=S.data.locations.filter(function(l){return (l.code+' '+locPath(l)).toLowerCase().indexOf(q)>=0;})
      .sort(function(a,b){return locPath(a).localeCompare(locPath(b));});
    h+='<div class="list">';
    if(!flat.length) h+='<div class="empty">No matches</div>';
    flat.forEach(function(l){
      var cnt=S.data.parts.filter(function(p){return p.location===l.code&&p.status!=='sold';}).length;
      h+='<div class="item" onclick="openLocation(\''+l.id+'\')"><div class="ic">'+IC.box+'</div>'+
        '<div class="mid"><b>'+esc(locPath(l))+'</b><small>'+esc(l.code)+(cnt?' · '+cnt+' parts':'')+'</small></div></div>';
    });
    return h+'</div>';
  }
  var sel=locSel(), depth=locDepth(), curField=LOC_FIELDS[depth];
  // breadcrumb
  h+='<div class="chips" style="margin-bottom:.9rem"><button class="'+(depth===0?'on':'')+'" onclick="locGo(0)">All Yards</button>';
  for(var i=0;i<depth;i++){
    h+='<button class="'+(i===depth-1?'on':'')+'" onclick="locGo('+(i+1)+')">'+esc(sel[LOC_FIELDS[i]])+'</button>';
  }
  h+='</div>';
  // this node's own barcode card (a row at exactly this path)
  if(depth>0){
    var selfRow=S.data.locations.find(function(l){
      if(!locMatchesSel(l,depth)) return false;
      for(var j=depth;j<5;j++){ if(String(l[LOC_FIELDS[j]]||'').trim()) return false; }
      return true;
    });
    if(selfRow){
      h+='<div class="panel" style="display:flex;align-items:center;gap:.8rem;margin-bottom:.9rem">'+
        '<div style="flex:1"><b style="font-family:var(--ui)">'+esc(sel[LOC_FIELDS[depth-1]])+'</b><br><small class="subtle">barcode '+esc(selfRow.code)+' — scannable as a location itself</small></div>'+
        '<button class="btn ghost small" onclick="openLocation(\''+selfRow.id+'\')">Card</button></div>';
    }
  }
  // children at this level
  var kids={};
  S.data.locations.forEach(function(l){
    if(!locMatchesSel(l,depth)) return;
    var v=String(l[curField]||'').trim();
    if(!v) return;
    kids[v]=kids[v]||{rows:0,codes:{}};
    kids[v].rows++; kids[v].codes[l.code]=1;
  });
  var names=Object.keys(kids).sort(function(a,b){return a.localeCompare(b,undefined,{numeric:true});});
  var label=curField.charAt(0).toUpperCase()+curField.slice(1);
  h+='<div class="list">';
  if(!names.length) h+='<div class="empty">No '+curField+'s here yet'+(isAdmin()?' — add one below':'')+'</div>';
  names.forEach(function(nm){
    var parts=S.data.parts.filter(function(p){return p.status!=='sold'&&kids[nm].codes[p.location];}).length;
    var isShelf=curField==='shelf';
    var shelfRow=isShelf?S.data.locations.find(function(l){return locMatchesSel(l,depth)&&String(l.shelf)===nm;}):null;
    var click=isShelf?'openLocation(\''+(shelfRow?shelfRow.id:'')+'\')':'locGo('+depth+',\''+esc(nm).replace(/'/g,"\\'")+'\')';
    h+='<div class="item" onclick="'+click+'"><div class="ic">'+IC.box+'</div>'+
      '<div class="mid"><b>'+esc(nm)+'</b><small>'+(isShelf?(shelfRow?esc(shelfRow.code)+' · ':''):(kids[nm].rows+' location'+(kids[nm].rows>1?'s':'')+' · '))+(parts?parts+' part'+(parts>1?'s':''):'empty')+'</small></div>'+
      (isAdmin()?'<div class="amt" style="display:flex;gap:.35rem">'+
        '<button onclick="event.stopPropagation();renameLocNode(\''+curField+'\',\''+esc(nm).replace(/'/g,"\\'")+'\')" aria-label="Rename" style="background:var(--panel2);border:1px solid var(--line);border-radius:7px;width:30px;height:30px;color:var(--ink-dim);cursor:pointer">✎</button>'+
        '<button onclick="event.stopPropagation();deleteLocNode(\''+curField+'\',\''+esc(nm).replace(/'/g,"\\'")+'\')" aria-label="Delete" style="background:var(--panel2);border:1px solid var(--line);border-radius:7px;width:30px;height:30px;color:var(--tag-red);cursor:pointer">&times;</button></div>':'')+
      '</div>';
  });
  h+='</div>';
  if(isAdmin()) h+='<div class="mact" style="margin-top:1rem"><button class="btn full" onclick="openAddLocNode(\''+curField+'\')">'+IC.plus+' Add '+label+(curField==='shelf'?' (or range 1-5)':'')+'</button></div>';
  return h;
}
function openAddLocNode(field){
  var sel=locSel(), depth=locDepth();
  var crumbs=[]; for(var i=0;i<depth;i++) crumbs.push(sel[LOC_FIELDS[i]]);
  var label=field.charAt(0).toUpperCase()+field.slice(1);
  var h='<div class="mhead"><h3>ADD '+label.toUpperCase()+'</h3><button onclick="closeModal()">&times;</button></div>';
  if(crumbs.length) h+='<div class="kv"><span>Inside</span><b>'+esc(crumbs.join(' › '))+'</b></div>';
  h+='<div class="field" style="margin-top:.6rem"><label>'+label+' name'+(field==='shelf'?' (or a range like 1-5)':'')+' *</label><input id="lnName" data-autofocus placeholder="'+(field==='shelf'?'Shelf 1 or 1-5':label+' name')+'"></div>';
  h+='<div class="mact"><button class="btn full" onclick="saveLocNode(\''+field+'\')">Save</button></div>';
  openModal(h);
}
function saveLocNode(field){
  var nm=$('lnName').value.trim();
  if(!nm){ toast('Name it',true); return; }
  var sel=locSel(), depth=locDepth();
  var names=[nm];
  if(field==='shelf'){
    var m=nm.match(/^(\d+)\s*-\s*(\d+)$/);
    if(m){ var a=+m[1],b=+m[2]; if(b<a){var t=a;a=b;b=t;} if(b-a>49){ toast('Max 50 at once',true); return; }
      names=[]; for(var i=a;i<=b;i++) names.push('Shelf '+i); }
  }
  var made=0;
  names.forEach(function(n){
    var dup=S.data.locations.some(function(l){
      if(!locMatchesSel(l,depth)) return false;
      if(String(l[field]||'')!==n) return false;
      for(var j=LOC_FIELDS.indexOf(field)+1;j<5;j++){ if(String(l[LOC_FIELDS[j]]||'').trim()) return false; }
      return true;
    });
    if(dup) return;
    var row={id:uid(),code:nextLocCode(),yard:sel.yard,section:sel.section,aisle:sel.aisle,bay:sel.bay,shelf:'',notes:''};
    row[field]=n;
    addRow('Locations',row,true);
    made++;
  });
  toast(made?made+' added':'Already exists');
  closeModal(); render();
}
function renameLocNode(field,oldName){
  var nn=prompt('Rename "'+oldName+'" to:',oldName);
  if(nn===null) return;
  nn=nn.trim();
  if(!nn||nn===oldName) return;
  var depth=locDepth(), n=0;
  S.data.locations.forEach(function(l){
    if(!locMatchesSel(l,depth)) return;
    if(String(l[field]||'')!==oldName) return;
    var f={}; f[field]=nn;
    updateRow('Locations',l.id,f);
    n++;
  });
  toast('Renamed on '+n+' location'+(n>1?'s':'')); render();
}
function deleteLocNode(field,name){
  var depth=locDepth();
  var rows=S.data.locations.filter(function(l){ return locMatchesSel(l,depth)&&String(l[field]||'')===name; });
  var codes={}; rows.forEach(function(l){codes[l.code]=1;});
  var partsHere=S.data.parts.filter(function(p){return codes[p.location];}).length;
  var msg='Delete "'+name+'" and everything inside it? ('+rows.length+' location'+(rows.length>1?'s':'')+')';
  if(partsHere) msg+='\n\n'+partsHere+' part(s) point here — they keep the code but it will show as unknown.';
  if(!confirm(msg)) return;
  rows.forEach(function(l){ api({action:'delete',sheet:'Locations',id:l.id}); });
  S.data.locations=S.data.locations.filter(function(l){ return !(locMatchesSel(l,depth)&&String(l[field]||'')===name); });
  render(); toast('Deleted');
}

function alLocApply(partId,code){

function editPart(id){

var C128=['212222','222122','222221','121223','121322','131222','122213','122312','132212','221213','221312','231212','112232','122132','122231','113222','123122','123221','223211','221132','221231','213212','223112','312131','311222','321122','321221','312212','322112','322211','212123','212321','232121','111323','131123','131321','112313','132113','132311','211313','231113','231311','112133','112331','132131','113123','113321','133121','313121','211331','231131','213113','213311','213131','311123','311321','331121','312113','312311','332111','314111','221411','431111','111224','111422','121124','121421','141122','141221','112214','112412','122114','122411','142112','142211','241211','221114','413111','241112','134111','111242','121142','121241','114212','124112','124211','411212','421112','421211','212141','214121','412121','111143','111341','131141','114113','114311','411113','411311','113141','114131','311141','411131','211412','211214','211232','2331112'];
function code128svg(text,mod,height){
  mod=mod||2; height=height||60;
  var codes=[104], sum=104;
  for(var i=0;i<text.length;i++){
    var v=text.charCodeAt(i)-32;
    if(v<0||v>94) v=0;
    codes.push(v); sum+=v*(i+1);
  }
  codes.push(sum%103); codes.push(106);
  var x=0, bars='';
  codes.forEach(function(c){
    var pat=C128[c];
    for(var j=0;j<pat.length;j++){
      var w=+pat[j]*mod;
      if(j%2===0) bars+='<rect x="'+x+'" y="0" width="'+w+'" height="'+height+'" fill="#000"/>';
      x+=w;
    }
  });
  var quiet=10*mod;
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+(x+quiet*2)+' '+height+'" width="'+Math.min(320,x+quiet*2)+'" height="'+height+'"><g transform="translate('+quiet+',0)">'+bars+'</g></svg>';
}
function code128canvas(text,widthPx,heightPx,label){
  // renders barcode + text onto a canvas
  var codes=[104],sum=104;
  for(var i=0;i<text.length;i++){ var v=text.charCodeAt(i)-32; if(v<0||v>94)v=0; codes.push(v); sum+=v*(i+1); }
  codes.push(sum%103); codes.push(106);
  var units=0;
  codes.forEach(function(c){ var p=C128[c]; for(var j=0;j<p.length;j++) units+=+p[j]; });
  var cv=document.createElement('canvas'); cv.width=widthPx; cv.height=heightPx;
  var ctx=cv.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,widthPx,heightPx);
  var quiet=Math.round(widthPx*0.05);
  var mod=(widthPx-quiet*2)/units;
  var barH=label?Math.round(heightPx*0.62):heightPx-8;
  var x=quiet;
  ctx.fillStyle='#000';
  codes.forEach(function(c){
    var p=C128[c];
    for(var j=0;j<p.length;j++){
      var w=+p[j]*mod;
      if(j%2===0) ctx.fillRect(Math.round(x),4,Math.max(1,Math.round(w)),barH);
      x+=w;
    }
  });
  if(label){
    ctx.font='bold '+Math.round(heightPx*0.2)+'px Arial';
    ctx.textAlign='center';
    ctx.fillText(text,widthPx/2,heightPx-Math.round(heightPx*0.06));
  }
  return cv;
}

  var d=_labelData; if(!d) return '';

   SCAN STATION + HISTORY
   ============================================================ */
function clearScanHistory(){
  if(!confirm('Delete the entire scan history? This cannot be undone.')) return;
  S.data.scanlog=[];
  api({action:'clearsheet',sheet:'ScanLog'}).then(function(res){
    if(res&&res.ok) toast('Scan history cleared'); else toast('Could not clear on the server',true);
  });
  render();
}
function rScan(){
  var last=S.data.scanlog.slice().sort(function(a,b){return String(b.date).localeCompare(String(a.date));})[0];
  var h='';
  if(S.activeLoc){
    var al=locByCode(S.activeLoc);
    h+='<div class="panel" style="border-left:4px solid var(--green);display:flex;align-items:center;gap:.8rem;margin-bottom:1rem">'+
      '<div style="flex:1"><b style="font-family:var(--ui)">SHELVING MODE</b><br><small class="subtle">'+(al?esc(locPath(al)):esc(S.activeLoc))+' — every part you scan gets placed here</small></div>'+
      '<button class="btn ghost small" onclick="S.activeLoc=\'\';render()">Done</button></div>';
  }
  h+='<div class="vhead"><h2>SCAN STATION</h2>'+(isAdmin()&&S.data.scanlog.length?'<div class="spacer"></div><button class="btn ghost small" onclick="clearScanHistory()">Clear History</button>':'')+'</div>';
  h+='<div class="bigscan"><input id="scanInput" data-autofocus placeholder="SCAN BARCODE" autocomplete="off" onkeydown="if(event.key===\'Enter\')doScan(this.value)">'+
     '<div style="margin-top:.7rem"><button class="btn full" onclick="cameraScan()">'+IC.scan+' Scan with Camera</button></div>'+
     '<p>Bluetooth scanner: tap the box and pull the trigger. No scanner? Use the camera button — point the phone at the label.</p></div>';
  h+='<div id="scanResult"></div>';
  if(last) h+='<p class="subtle" style="margin-top:1rem">Last: <b>'+esc(last.sku)+'</b> — '+esc(last.action)+' by '+esc(last.worker)+' · '+esc(last.date)+
     ' · <a href="#" onclick="S.view=\'scanlog\';render();return false" style="color:var(--blue)">full history</a></p>';
  return h;
}
function doScan(sku){
  sku=String(sku||'').trim().toUpperCase();
  if(!sku) return;
  $('scanInput').value='';
  var scannedLoc=locByCode(sku);
  if(scannedLoc){
    S.activeLoc=scannedLoc.code;
    render();
    toast('Shelving mode: '+locPath(scannedLoc));
    return;
  }
  var p=S.data.parts.find(function(x){return String(x.sku).toUpperCase()===sku;});
  if(!p){
    var tr=S.data.trucks.find(function(x){return String(x.trucknumber).toUpperCase()===sku;});
    if(tr){
      logScan({id:tr.id,sku:tr.trucknumber},'scan');
      var tl=((tr.year?tr.year+' ':'')+(tr.make||'')+' '+(tr.model||'')).trim();
      $('scanResult').innerHTML='<div class="panel" style="border-color:var(--green)">'+
        '<h3>'+esc(tr.trucknumber)+' <em>TRUCK</em></h3>'+
        '<div class="kv"><span>Truck</span><b>'+esc(tl||'—')+'</b></div>'+
        (tr.vin?'<div class="kv"><span>VIN</span><b>'+esc(tr.vin)+'</b></div>':'')+
        (tr.mileage?'<div class="kv"><span>Mileage</span><b>'+fmtMiles(tr.mileage)+'</b></div>':'')+
        '<div class="kv"><span>Status</span><b>'+esc(tr.status||'Whole')+'</b></div>'+
        (num(tr.askingprice)?'<div class="kv"><span>Asking</span><b>'+money(tr.askingprice)+'</b></div>':'')+
        '<div class="mact">'+
        (tr.status!=='Sold'&&!isYard()?'<button class="btn green full" onclick="openAddSale({sku:\''+esc(tr.trucknumber)+'\'})">Sell This Truck</button>':'')+
        '<button class="btn ghost full" onclick="openTruck(\''+tr.id+'\')">View Truck</button></div></div>';
      return;
    }
    $('scanResult').innerHTML='<div class="panel" style="border-color:var(--red)"><b>'+esc(sku)+'</b> — not found in parts, trucks, or locations.</div>';
    return;
  }
  if(S.activeLoc){
    var tgt=locByCode(S.activeLoc);
    if(tgt){ assignPartLocation(p,tgt); render(); return; }
  }
  logScan(p,'scan');
  var order=S.data.deliveries.find(function(x){
    if(x.partid!==p.id||x.yardprep!=='yes') return false;
    var ls=shipStatusesFor(x);
    return x.shipstatus!==ls[ls.length-1];
  });
  var oh='';
  if(order){
    var LSo=shipStatusesFor(order);
    var cur=order.shipstatus||'Order Created';
    var ni=LSo.indexOf(cur);
    oh='<div class="panel" style="border-color:var(--blue);border-left:4px solid var(--blue)">'+
      '<h3>YARD <em>ORDER</em></h3>'+
      '<div class="kv"><span>Ship to</span><b>'+esc(order.destination||'—')+'</b></div>'+
      '<div class="kv"><span>Status</span><b>'+shipTag(cur)+'</b></div>'+
      (ni<LSo.length-1?'<div class="mact" style="margin-top:.5rem"><button class="btn '+((LSo[ni+1]==='Shipped'||LSo[ni+1]==='Picked Up')?'green ':'')+'full" onclick="advanceShip(\''+order.id+'\');doScan(\''+esc(p.sku)+'\')">Mark '+LSo[ni+1]+'</button></div>':'')+
      '</div>';
  }
  var unit=[p.specyear,p.specmake,p.specmodel].filter(Boolean).join(' ');
  var h=oh+'<div class="panel" style="border-color:var(--green)">'+
    '<h3>'+esc(p.sku)+' <em>FOUND</em></h3>'+
    '<div class="kv"><span>Part</span><b>'+esc(p.name)+'</b></div>'+
    (unit?'<div class="kv"><span>Year / Make / Model</span><b>'+esc(unit)+'</b></div>':'')+
    (p.mileage?'<div class="kv"><span>Mileage</span><b>'+fmtMiles(p.mileage)+'</b></div>':'')+
    (p.hp?'<div class="kv"><span>Horsepower</span><b>'+esc(p.hp)+'</b></div>':'')+
    (p.truck?'<div class="kv"><span>From truck</span><b>'+esc(p.truck)+'</b></div>':'')+
    (function(){ var lo=locOf(p); return lo?'<div class="kv"><span>Location</span><b style="color:var(--blue)">'+esc(locPath(lo))+'</b></div>':''; })()+
    '<div class="kv"><span>Price</span><b>'+(num(p.price)?money(p.price):'—')+'</b></div>'+
    '<div class="kv"><span>Status</span><b>'+(p.status==='sold'?'SOLD':'In stock'+(num(p.qty)>1?' — '+num(p.qty)+' available':''))+'</b></div>'+
    '<div class="mact">'+
    (p.status!=='sold'?'<button class="btn green full" onclick="openAddSale({sku:\''+esc(p.sku)+'\',desc:\''+esc(p.name).replace(/'/g,"\\'")+'\',amount:'+(num(p.price)||'\'\'')+'})">Sell This Part</button>':'')+
    (p.sellmode==='parts'&&!isYard()?'<button class="btn full" onclick="quickSellComponent(\''+p.id+'\')">Sell Parts off This Unit</button>':'')+
    (p.status!=='sold'?'<button class="btn ghost full" onclick="addToCart(\''+p.id+'\',1)">Add to Cart</button>':'')+
    '<button class="btn ghost full" onclick="openPart(\''+p.id+'\')">View / Print Label</button></div></div>';
  $('scanResult').innerHTML=h;
}
var _zxingReader=null;
function stopCamera(){
  try{ if(_zxingReader){ _zxingReader.reset(); _zxingReader=null; } }catch(e){}
}
function closeCamOverlay(){
  stopCamera();
  var el=$('camWrap'); if(el) el.parentNode.removeChild(el);
}
function cameraScan(cb){
  cb = cb || function(code){
    if(S.view!=='scan'){ S.view='scan'; render(); }
    setTimeout(function(){ doScan(code); },50);
  };
  var start=function(){
    closeCamOverlay();
    var wrap=document.createElement('div');
    wrap.id='camWrap';
    wrap.style.cssText='position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem';
    wrap.innerHTML='<div style="position:relative;width:100%;max-width:520px;border-radius:14px;overflow:hidden;background:#000">'+
      '<video id="camVideo" playsinline muted style="width:100%;display:block;max-height:65vh;object-fit:cover"></video>'+
      '<div style="position:absolute;left:8%;right:8%;top:42%;height:16%;border:2px solid #D62B2B;border-radius:8px"></div></div>'+
      '<p style="color:#ccc;font-size:.8rem;margin:.9rem 0;text-align:center">Line the barcode up in the red box — it reads automatically.</p>'+
      '<button id="camClose" style="background:#26282C;border:1px solid #444;color:#fff;font-family:var(--ui);letter-spacing:.08em;text-transform:uppercase;font-size:.8rem;padding:.7rem 2rem;border-radius:9px;cursor:pointer">Cancel</button>';
    document.body.appendChild(wrap);
    $('camClose').onclick=closeCamOverlay;
    try{
      _zxingReader=new ZXing.BrowserMultiFormatReader();
      _zxingReader.decodeFromVideoDevice(null,'camVideo',function(result,err){
        if(result){
          var code=result.getText();
          closeCamOverlay();
          cb(code);
        }
      });
    }catch(err){
      toast('Camera not available: '+err.message,true); closeCamOverlay();
    }
  };
  if(typeof ZXing!=='undefined'){ start(); return; }
  toast('Loading camera scanner...');
  var sc=document.createElement('script');
  sc.src='https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js';
  sc.onload=start;
  sc.onerror=function(){ toast('Could not load the scanner — check internet',true); };
  document.head.appendChild(sc);
}
function cameraScanToField(id){
  cameraScan(function(code){
    var el=$(id); if(!el) return;
    el.value=code;
    if(id==='fSku') skuLookup(code);
    if(id==='ppPart') ppPartLookup(code);
    if(id==='rtSwap') rtSwapLookup(code);
    if(id==='cartSkuGhost') cartSkuAdd(code);
    if(id==='dPartSku') dPartLookup(code);
    if(id==='alLoc'&&el.onchange) el.onchange();
    if(id==='yoPartSku') yoPartLookup(code);
  });
}
function rScanLog(){
  var recent=S.data.scanlog.slice().sort(function(a,b){return String(b.date).localeCompare(String(a.date));}).slice(0,100);
  var h='<div class="vhead"><h2>SCAN HISTORY</h2>'+(isAdmin()&&S.data.scanlog.length?'<div class="spacer"></div><button class="btn ghost small" onclick="clearScanHistory()">Clear History</button>':'')+'</div><div class="list">';
  if(!recent.length) h+='<div class="empty">No scans yet</div>';
  recent.forEach(function(l){
    h+='<div class="item"><div class="ic">'+IC.scan+'</div><div class="mid"><b>'+esc(l.sku)+'</b><small>'+esc(l.action)+' by '+esc(l.worker)+'</small></div>'+
      '<div class="amt"><small>'+esc(l.date)+'</small></div></div>';
  });
  return h+'</div>';
}

/* ============================================================
   INIT
   ============================================================ */
buildPinPad(); drawDots();
if($('verTag')) $('verTag').textContent=APP_VERSION;
if($('whoVer')) $('whoVer').textContent=APP_VERSION;
if(S.pin && API_URL.indexOf('http')===0){
  $('loginMsg').className='info'; $('loginMsg').textContent='Signing you back in...';
  api({action:'login'}).then(function(res){
    if(res.ok){ S.worker=res.worker; mergeData(res.data); checkBackend(res); enterApp(); }
    else { localStorage.removeItem('tptg_pin'); S.pin=''; $('loginMsg').textContent=''; }
  }).catch(function(){ $('loginMsg').className=''; $('loginMsg').textContent='Connection error — check internet'; });
}
